apiVersion: apps/v1
kind: Deployment
metadata:
  name: shareslices-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shareslices-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shareslices-api
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/walnut1024/shareslices-api:0.0.1
          command: ["node", "dist/src/db/migrate.js"]
          envFrom:
            - configMapRef:
                name: shareslices-config
            - secretRef:
                name: shareslices-secret
      containers:
        - name: api
          image: ghcr.io/walnut1024/shareslices-api:0.0.1
          envFrom:
            - configMapRef:
                name: shareslices-config
            - secretRef:
                name: shareslices-secret
          ports:
            - name: http
              containerPort: 7456
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: shareslices-api
spec:
  type: ClusterIP
  clusterIP: 10.96.10.11
  selector:
    app.kubernetes.io/name: shareslices-api
  ports:
    - name: http
      port: 7456
      targetPort: http
