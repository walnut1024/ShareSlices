apiVersion: apps/v1
kind: Deployment
metadata:
  name: shareslices-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shareslices-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shareslices-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/walnut1024/shareslices-worker:0.0.1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
          envFrom:
            - configMapRef:
                name: shareslices-config
            - secretRef:
                name: shareslices-secret
          startupProbe:
            exec:
              command: ["shareslices-worker", "healthcheck"]
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          readinessProbe:
            exec:
              command: ["shareslices-worker", "healthcheck"]
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["shareslices-worker", "healthcheck"]
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
