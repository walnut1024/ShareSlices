apiVersion: apps/v1
kind: Deployment
metadata:
  name: shareslices-content
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shareslices-content
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shareslices-content
    spec:
      containers:
        - name: content
          image: ghcr.io/walnut1024/shareslices-api:0.0.1
          command: ["node", "dist/src/content/main.js"]
          env:
            - name: GALLERY_CONTENT_PORT
              valueFrom: {configMapKeyRef: {name: shareslices-config, key: GALLERY_CONTENT_PORT}}
            - name: DATABASE_URL
              valueFrom: {secretKeyRef: {name: shareslices-secret, key: DATABASE_URL}}
            - name: S3_ENDPOINT
              valueFrom: {configMapKeyRef: {name: shareslices-config, key: S3_ENDPOINT}}
            - name: S3_REGION
              valueFrom: {configMapKeyRef: {name: shareslices-config, key: S3_REGION}}
            - name: S3_BUCKET
              valueFrom: {configMapKeyRef: {name: shareslices-config, key: S3_BUCKET}}
            - name: S3_ACCESS_KEY_ID
              valueFrom: {secretKeyRef: {name: shareslices-secret, key: S3_ACCESS_KEY_ID}}
            - name: S3_SECRET_ACCESS_KEY
              valueFrom: {secretKeyRef: {name: shareslices-secret, key: S3_SECRET_ACCESS_KEY}}
          ports:
            - {name: http, containerPort: 7460}
          readinessProbe: {httpGet: {path: /ready, port: http}}
          livenessProbe: {httpGet: {path: /health, port: http}}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities: {drop: ["ALL"]}
---
apiVersion: v1
kind: Service
metadata:
  name: shareslices-content
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: shareslices-content
  ports:
    - {name: http, port: 7460, targetPort: http}
