[tools]
node = "26.4.0"
python = "3.13.14"
rust = "1.96.1"

[tasks.install]
description = "Install workspace dependencies"
run = "pnpm install"

[tasks.dev-infra]
description = "Start local PostgreSQL and object storage"
run = "docker compose up -d --wait postgres object-storage && docker compose run --rm object-storage-init"

[tasks.dev]
description = "Run Web, API, and Worker locally with containerized infrastructure"
run = "node tools/dev.mjs"

[tasks.dev-compose]
description = "Build and run the full stack in containers"
run = "docker compose build && docker compose up -d --force-recreate"

[tasks.dev-down]
description = "Stop local development and production-simulation containers"
run = "docker compose down"

[tasks.check]
description = "Run the local quality gate"
run = "pnpm run check"

[tasks.docs-check]
description = "Lint Markdown documents"
run = "pnpm run docs:check"

[tasks.spellcheck]
description = "Run spelling checks"
run = "pnpm run spellcheck"

[tasks.api-test]
description = "Run API unit and contract tests"
run = "pnpm run api:test"

[tasks.web-test]
description = "Run Web tests"
run = "pnpm run web:test"

[tasks.rust-fmt]
description = "Check Rust formatting"
run = "pnpm run rust:fmt"

[tasks.rust-clippy]
description = "Lint all Rust targets and features"
run = "pnpm run rust:clippy"

[tasks.rust-test]
description = "Run Rust workspace tests"
run = "pnpm run rust:test"

[tasks.rust-check]
description = "Run the Rust quality gate"
run = "pnpm run rust:check"

[tasks.cli-test]
description = "Run ShareSlices CLI tests"
run = "cargo test -p shareslices-cli"
