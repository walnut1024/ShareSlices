[tools]
node = "26.4.0"
python = "3.13.14"
rust = "1.96.1"

[tasks.install]
description = "Install workspace dependencies"
run = "pnpm install"

[tasks.dev]
description = "Build, start, and verify the canonical local stack"
run = "node tools/local-stack.mjs up"

[tasks.ops-thumbnail-requeue]
description = "Requeue terminal local thumbnail jobs after Chromium recovery"
run = "docker compose -f compose.yaml -f compose.gallery-local.yaml run --rm --no-deps worker requeue-failed-thumbnails"

[tasks.ops-gallery-bootstrap]
description = "Install approved local Gallery policies and grant an explicit Administrator"
run = "node --env-file=.env.example --env-file-if-exists=.env api/node_modules/tsx/dist/cli.mjs api/src/operations/gallery-local-bootstrap.ts"

[tasks.dev-down]
description = "Stop the canonical local stack"
run = "node tools/local-stack.mjs down"

[tasks.dev-status]
description = "Show and verify the canonical local stack"
run = "node tools/local-stack.mjs status"

[tasks.dev-logs]
description = "Follow canonical local stack logs"
run = "node tools/local-stack.mjs logs"

[tasks.check]
description = "Run the local quality gate"
run = "pnpm run check"

[tasks.docs-check]
description = "Lint Markdown documents"
run = "pnpm run docs:check"

[tasks.spellcheck]
description = "Run spelling checks"
run = "pnpm run spellcheck"

[tasks.api-test]
description = "Run API unit and contract tests"
run = "pnpm run api:test"

[tasks.smtp-check]
description = "Verify SMTP connectivity and optionally deliver a probe message"
run = "node tools/run-smtp-check.mjs"

[tasks.web-test]
description = "Run Web tests"
run = "pnpm run web:test"

[tasks.web-e2e]
description = "Run desktop Web end-to-end tests against a running local stack"
run = "pnpm --dir web run e2e --project=desktop-chromium"

[tasks.rust-fmt]
description = "Check Rust formatting"
run = "pnpm run rust:fmt"

[tasks.rust-clippy]
description = "Lint all Rust targets and features"
run = "pnpm run rust:clippy"

[tasks.rust-test]
description = "Run Rust workspace tests"
run = "pnpm run rust:test"

[tasks.rust-check]
description = "Run the Rust quality gate"
run = "pnpm run rust:check"

[tasks.cli-test]
description = "Run ShareSlices CLI tests"
run = "cargo test -p shareslices-cli"
