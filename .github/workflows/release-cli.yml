name: Release CLI

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: read

jobs:
  verify-version:
    name: Verify CLI tag
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches the CLI package version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#cli-v}"
          package_version="$(sed -n 's/^version = "\(.*\)"$/\1/p' cli/Cargo.toml | head -n 1)"

          test -n "$package_version"
          test "$tag_version" = "$package_version"

  build:
    name: Build ${{ matrix.target }}
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libdbus-1-dev pkg-config
      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }} -p shareslices-cli
      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir package
          cp target/${{ matrix.target }}/release/shareslices package/shareslices
          tar -C package -czf "shareslices-${{ matrix.target }}.tar.gz" shareslices
      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/shareslices.exe -DestinationPath "shareslices-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: shareslices-${{ matrix.target }}
          path: shareslices-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Add official installers
        run: |
          cp cli/install/install.sh dist/install.sh
          cp cli/install/install.ps1 dist/install.ps1
      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "ShareSlices CLI ${GITHUB_REF_NAME#cli-v}" \
            --generate-notes

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: publish
    if: ${{ vars.HOMEBREW_TAP_SYNC_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          repository: walnut1024/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Write Formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#cli-v}"
          release="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME")"
          arm_sha="$(jq -r '.assets[] | select(.name == "shareslices-aarch64-apple-darwin.tar.gz") | .digest | sub("^sha256:"; "")' <<<"$release")"
          linux_sha="$(jq -r '.assets[] | select(.name == "shareslices-x86_64-unknown-linux-gnu.tar.gz") | .digest | sub("^sha256:"; "")' <<<"$release")"
          mkdir -p tap/Formula
          cat > tap/Formula/shareslices.rb <<EOF
          class Shareslices < Formula
            desc "Publish and manage ShareSlices artifacts"
            homepage "https://github.com/walnut1024/ShareSlices"
            version "$version"

            on_macos do
              odie "ShareSlices supports macOS Apple Silicon only" unless Hardware::CPU.arm?
              url "https://github.com/walnut1024/ShareSlices/releases/download/cli-v$version/shareslices-aarch64-apple-darwin.tar.gz"
              sha256 "$arm_sha"
            end

            on_linux do
              url "https://github.com/walnut1024/ShareSlices/releases/download/cli-v$version/shareslices-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "$linux_sha"
            end

            def install
              bin.install "shareslices"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/shareslices --version")
            end
          end
          EOF
      - name: Commit Formula
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/shareslices.rb
          git diff --cached --quiet || git commit -m "brew: update shareslices to ${GITHUB_REF_NAME#cli-v}"
          git push
