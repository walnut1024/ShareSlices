services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: shareslices
      POSTGRES_USER: shareslices
      POSTGRES_PASSWORD: shareslices
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shareslices -d shareslices"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - shareslices-postgres:/var/lib/postgresql/data

  object-storage:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-shareslices}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-shareslices-local-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - shareslices-object-storage:/data

  object-storage-init:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      object-storage:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-shareslices}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-shareslices-local-secret}
      S3_BUCKET: ${S3_BUCKET:-shareslices-artifacts}
    entrypoint:
      - /bin/sh
      - -c
      - >-
        mc alias set local http://object-storage:9000
        "$${S3_ACCESS_KEY_ID}" "$${S3_SECRET_ACCESS_KEY}" &&
        mc mb --ignore-existing "local/$${S3_BUCKET}"
    restart: "no"

  mailpit:
    image: ghcr.io/axllent/mailpit:v1.30.0
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 2s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: ["node", "dist/src/db/migrate.js"]
    environment: &api-environment
      DATABASE_URL: postgres://shareslices:shareslices@postgres:5432/shareslices
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-local-development-secret-at-least-32-bytes}
      BETTER_AUTH_URL: http://127.0.0.1:5173
      WEB_ORIGIN: http://127.0.0.1:5173
      API_ORIGIN: http://127.0.0.1:7456
      VIEWER_ORIGIN: http://127.0.0.1:5173
      S3_ENDPOINT: http://object-storage:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-shareslices-artifacts}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-shareslices}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-shareslices-local-secret}
      S3_FORCE_PATH_STYLE: "true"
      WORKER_JOB_POLL_INTERVAL_MS: ${WORKER_JOB_POLL_INTERVAL_MS:-1000}
      WORKER_JOB_LEASE_SECONDS: ${WORKER_JOB_LEASE_SECONDS:-30}
      WORKER_JOB_HEARTBEAT_SECONDS: ${WORKER_JOB_HEARTBEAT_SECONDS:-10}
      WORKER_JOB_MAX_ATTEMPTS: ${WORKER_JOB_MAX_ATTEMPTS:-3}
      CONTENT_FINGERPRINT_KEY_CURRENT: ${CONTENT_FINGERPRINT_KEY_CURRENT:-development-content-fingerprint-key-32}
      CONTENT_FINGERPRINT_KEY_CURRENT_REVISION: ${CONTENT_FINGERPRINT_KEY_CURRENT_REVISION:-key-v1}
      CONTENT_FINGERPRINT_KEY_PREVIOUS: ${CONTENT_FINGERPRINT_KEY_PREVIOUS:-}
      CONTENT_FINGERPRINT_KEY_PREVIOUS_REVISION: ${CONTENT_FINGERPRINT_KEY_PREVIOUS_REVISION:-}
      IDEMPOTENCY_ENCRYPTION_KEY_CURRENT: ${IDEMPOTENCY_ENCRYPTION_KEY_CURRENT:-development-idempotency-encryption-key-32}
      IDEMPOTENCY_ENCRYPTION_KEY_CURRENT_REVISION: ${IDEMPOTENCY_ENCRYPTION_KEY_CURRENT_REVISION:-key-v1}
      IDEMPOTENCY_ENCRYPTION_KEY_PREVIOUS: ${IDEMPOTENCY_ENCRYPTION_KEY_PREVIOUS:-}
      IDEMPOTENCY_ENCRYPTION_KEY_PREVIOUS_REVISION: ${IDEMPOTENCY_ENCRYPTION_KEY_PREVIOUS_REVISION:-}
      CONTENT_IDENTITY_REVISION: ${CONTENT_IDENTITY_REVISION:-content-v1}
      ARTIFACT_PROCESSING_REVISION: ${ARTIFACT_PROCESSING_REVISION:-processing-v1}
      ARTIFACT_RENDERER_REVISION: ${ARTIFACT_RENDERER_REVISION:-renderer-v2}
      MINIMUM_CLI_VERSION: ${MINIMUM_CLI_VERSION:-0.1.0}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-true}
      AUTH_EMAIL_ENCRYPTION_KEY: ${AUTH_EMAIL_ENCRYPTION_KEY:-local-email-encryption-secret-at-least-32-bytes}
      AUTH_EMAIL_SMTP_URL: ${AUTH_EMAIL_SMTP_URL:-smtp://mailpit:1025}
      AUTH_EMAIL_FROM: ${AUTH_EMAIL_FROM:-ShareSlices <no-reply@shareslices.local>}
      AUTH_EMAIL_DELIVERY_LEASE_SECONDS: ${AUTH_EMAIL_DELIVERY_LEASE_SECONDS:-60}
      AUTH_EMAIL_SMTP_DNS_TIMEOUT_MS: ${AUTH_EMAIL_SMTP_DNS_TIMEOUT_MS:-5000}
      AUTH_EMAIL_SMTP_CONNECTION_TIMEOUT_MS: ${AUTH_EMAIL_SMTP_CONNECTION_TIMEOUT_MS:-10000}
      AUTH_EMAIL_SMTP_GREETING_TIMEOUT_MS: ${AUTH_EMAIL_SMTP_GREETING_TIMEOUT_MS:-10000}
      AUTH_EMAIL_SMTP_SOCKET_TIMEOUT_MS: ${AUTH_EMAIL_SMTP_SOCKET_TIMEOUT_MS:-30000}
      AUTH_EMAIL_RETRY_DELAY_SECONDS: ${AUTH_EMAIL_RETRY_DELAY_SECONDS:-30}
      AUTH_EMAIL_RESEND_SECONDS: ${AUTH_EMAIL_RESEND_SECONDS:-60}
      AUTH_EMAIL_PER_EMAIL_HOUR: ${AUTH_EMAIL_PER_EMAIL_HOUR:-5}
      AUTH_EMAIL_PER_EMAIL_DAY: ${AUTH_EMAIL_PER_EMAIL_DAY:-10}
      AUTH_EMAIL_PER_IP_HOUR: ${AUTH_EMAIL_PER_IP_HOUR:-20}
      AUTH_EMAIL_PER_IP_DAY: ${AUTH_EMAIL_PER_IP_DAY:-100}
      AUTH_EMAIL_GLOBAL_HOUR: ${AUTH_EMAIL_GLOBAL_HOUR:-500}
      AUTH_EMAIL_MAX_ATTEMPTS: ${AUTH_EMAIL_MAX_ATTEMPTS:-3}
      AUTH_EMAIL_CIRCUIT_BREAKER_SECONDS: ${AUTH_EMAIL_CIRCUIT_BREAKER_SECONDS:-300}
      PORT: "7456"
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment: *api-environment
    ports:
      - "7456:7456"
    depends_on:
      migrate:
        condition: service_completed_successfully
      object-storage-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7456/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      DATABASE_URL: postgres://shareslices:shareslices@postgres:5432/shareslices
      S3_ENDPOINT: http://object-storage:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-shareslices-artifacts}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-shareslices}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-shareslices-local-secret}
      S3_FORCE_PATH_STYLE: "true"
      WORKER_JOB_POLL_INTERVAL_MS: ${WORKER_JOB_POLL_INTERVAL_MS:-1000}
      WORKER_JOB_LEASE_SECONDS: ${WORKER_JOB_LEASE_SECONDS:-30}
      WORKER_JOB_HEARTBEAT_SECONDS: ${WORKER_JOB_HEARTBEAT_SECONDS:-10}
      WORKER_JOB_MAX_ATTEMPTS: ${WORKER_JOB_MAX_ATTEMPTS:-3}
      CONTENT_FINGERPRINT_KEY_CURRENT: ${CONTENT_FINGERPRINT_KEY_CURRENT:-development-content-fingerprint-key-32}
      CONTENT_FINGERPRINT_KEY_CURRENT_REVISION: ${CONTENT_FINGERPRINT_KEY_CURRENT_REVISION:-key-v1}
      CONTENT_FINGERPRINT_KEY_PREVIOUS: ${CONTENT_FINGERPRINT_KEY_PREVIOUS:-}
      CONTENT_FINGERPRINT_KEY_PREVIOUS_REVISION: ${CONTENT_FINGERPRINT_KEY_PREVIOUS_REVISION:-}
      CONTENT_IDENTITY_REVISION: ${CONTENT_IDENTITY_REVISION:-content-v1}
      ARTIFACT_PROCESSING_REVISION: ${ARTIFACT_PROCESSING_REVISION:-processing-v1}
      ARTIFACT_RENDERER_REVISION: ${ARTIFACT_RENDERER_REVISION:-renderer-v2}
      THUMBNAIL_INTERNAL_API_ORIGIN: http://api:7456
      CHROMIUM_PATH: /usr/bin/chromium
      NODE_ENV: development
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      migrate:
        condition: service_completed_successfully
      object-storage-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "shareslices-worker", "healthcheck"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    environment:
      API_UPSTREAM: api:7456
    ports:
      - "5173:8080"
    volumes:
      - ./deploy/compose/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:8080/"]
      interval: 2s
      timeout: 5s
      retries: 30
    restart: unless-stopped

volumes:
  shareslices-postgres:
  shareslices-object-storage:
