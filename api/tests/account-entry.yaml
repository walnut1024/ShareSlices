# cspell:ignore dont
base_url: "http://127.0.0.1:7456"
failure_base_url: "http://127.0.0.1:7457"
smtp_base_url: "http://127.0.0.1:7458"
mailpit_url: "http://127.0.0.1:8025"
cases:
  - id: health
    request:
      method: GET
      path: /health
    expect:
      status: 200
      json:
        status: ok
        service: shareslices-api

  - id: ready
    request:
      method: GET
      path: /ready
    expect:
      status: 200
      json:
        status: ready
        checks:
          database:
            status: pass

  - id: register_valid_user
    request:
      method: POST
      path: /api/users
      json:
        name: Ada Lovelace
        email: "Ada-{run_id}@EXAMPLE.COM"
        password: "correct horse battery staple"
    expect:
      status: 201
      json_paths:
        user.name: Ada Lovelace
        user.email: "ada-{run_id}@example.com"
      no_set_cookie: true
    save:
      user_id: user.id

  - id: register_duplicate_user
    request:
      method: POST
      path: /api/users
      json:
        name: Ada Again
        email: "ada-{run_id}@example.com"
        password: "correct horse battery staple"
    expect:
      status: 409
      json_paths:
        error.code: email_already_registered

  - id: register_invalid_name
    request:
      method: POST
      path: /api/users
      json:
        name: ""
        email: "bad-name@example.com"
        password: "correct horse battery staple"
    expect:
      status: 400
      json_paths:
        error.code: invalid_request

  - id: register_invalid_email
    request:
      method: POST
      path: /api/users
      json:
        name: Bad Email
        email: "not-an-email"
        password: "correct horse battery staple"
    expect:
      status: 400
      json_paths:
        error.code: invalid_request

  - id: register_invalid_password
    request:
      method: POST
      path: /api/users
      json:
        name: Bad Password
        email: "bad-password@example.com"
        password: "short"
    expect:
      status: 400
      json_paths:
        error.code: invalid_request

  - id: register_unknown_field
    request:
      method: POST
      path: /api/users
      json:
        name: Extra Field
        email: "extra-{run_id}@example.com"
        password: "correct horse battery staple"
        admin: true
    expect:
      status: 400
      json_paths:
        error.code: invalid_request

  - id: current_user_without_login
    request:
      method: GET
      path: /api/users/me
    expect:
      status: 401
      json_paths:
        error.code: unauthenticated

  - id: request_password_reset_unknown_email
    request:
      method: POST
      path: /api/password-reset-attempts
      json:
        email: "missing-{run_id}@example.com"
    expect:
      status: 202
      json_paths:
        verification.expiresIn: 600
      no_set_cookie: true

  - id: request_password_reset_invalid_email
    request:
      method: POST
      path: /api/password-reset-attempts
      json:
        email: not-an-email
    expect:
      status: 400
      json_paths:
        error.code: invalid_request

  - id: resend_unknown_verification
    request:
      method: POST
      path: /api/email-verifications/missing/deliveries
      json: {}
    expect:
      status: 400
      json_paths:
        error.code: invalid_verification

  - id: verify_unknown_registration
    request:
      method: POST
      path: /api/email-verifications/missing/verify
      json:
        code: "123456"
    expect:
      status: 400
      json_paths:
        error.code: invalid_verification

  - id: verify_unknown_password_reset
    request:
      method: POST
      path: /api/password-reset-attempts/missing/verify
      json:
        code: "123456"
    expect:
      status: 400
      json_paths:
        error.code: invalid_verification

  - id: complete_unknown_password_reset
    request:
      method: POST
      path: /api/password-resets
      json:
        resetGrant: missing
        password: new-password
        confirmPassword: new-password
    expect:
      status: 400
      json_paths:
        error.code: invalid_reset_grant

  - id: register_verification_required_contract
    server: failure
    request:
      method: POST
      path: /api/users
      json:
        name: Contract
        email: contract-success@example.com
        password: password123
    expect:
      status: 202
      no_set_cookie: true
      json_paths:
        verification.id: contract-registration

  - id: resend_registration_verification_contract
    server: failure
    request:
      method: POST
      path: /api/email-verifications/contract-registration/deliveries
      json: {}
    expect:
      status: 202
      json_paths:
        verification.id: contract-registration

  - id: verify_registration_contract
    server: failure
    request:
      method: POST
      path: /api/email-verifications/contract-registration/verify
      json:
        code: "123456"
    expect:
      status: 200
      no_set_cookie: true
      json:
        verified: true

  - id: resend_registration_rate_limited_contract
    server: failure
    request:
      method: POST
      path: /api/email-verifications/contract-registration/deliveries
      headers:
        X-Contract-Fixture: rate-limited
      json: {}
    expect:
      status: 429
      json_paths:
        error.code: rate_limited

  - id: resend_registration_email_unavailable_contract
    server: failure
    request:
      method: POST
      path: /api/email-verifications/contract-registration/deliveries
      headers:
        X-Contract-Fixture: email-unavailable
      json: {}
    expect:
      status: 500
      json_paths:
        error.code: email_unavailable

  - id: request_password_reset_contract
    server: failure
    request:
      method: POST
      path: /api/password-reset-attempts
      json:
        email: contract-success@example.com
    expect:
      status: 202
      no_set_cookie: true
      json_paths:
        verification.id: contract-reset

  - id: verify_password_reset_contract
    server: failure
    request:
      method: POST
      path: /api/password-reset-attempts/contract-reset/verify
      json:
        code: "123456"
    expect:
      status: 200
      no_set_cookie: true
      json_paths:
        resetGrant: contract-grant

  - id: complete_password_reset_contract
    server: failure
    request:
      method: POST
      path: /api/password-resets
      json:
        resetGrant: contract-grant
        password: new-password
        confirmPassword: new-password
    expect:
      status: 200
      no_set_cookie: true
      json:
        reset: true

  - id: login_wrong_password
    request:
      method: POST
      path: /api/sessions
      json:
        email: "ada-{run_id}@example.com"
        password: "wrong password"
    expect:
      status: 401
      json_paths:
        error.code: invalid_login
        error.message: Email or password is incorrect.
      no_set_cookie: true

  - id: login_unknown_email
    request:
      method: POST
      path: /api/sessions
      json:
        email: "unknown@example.com"
        password: "wrong password"
    expect:
      status: 401
      json_paths:
        error.code: invalid_login
        error.message: Email or password is incorrect.
      no_set_cookie: true
      same_error_as: login_wrong_password

  - id: current_user_after_failed_login
    request:
      method: GET
      path: /api/users/me
    expect:
      status: 401
      json_paths:
        error.code: unauthenticated

  - id: login_invalid_request
    request:
      method: POST
      path: /api/sessions
      json:
        email: "not-an-email"
        password: "wrong password"
    expect:
      status: 400
      json_paths:
        error.code: invalid_request

  - id: login_unknown_field
    request:
      method: POST
      path: /api/sessions
      json:
        email: "ada-{run_id}@example.com"
        password: "correct horse battery staple"
        rememberMe: true
    expect:
      status: 400
      json_paths:
        error.code: invalid_request

  - id: login_valid_user
    request:
      method: POST
      path: /api/sessions
      client: browser_a
      json:
        email: "ada-{run_id}@example.com"
        password: "correct horse battery staple"
    expect:
      status: 201
      set_cookie: true
      json_paths:
        signedIn: true
      user.name: Ada Lovelace
      user.email: "ada-{run_id}@example.com"
    save_cookie: session

  - id: login_second_browser
    request:
      method: POST
      path: /api/sessions
      client: browser_b
      json:
        email: "ada-{run_id}@example.com"
        password: "correct horse battery staple"
    expect:
      status: 201
      set_cookie: true
      json_paths:
        signedIn: true
        user.name: Ada Lovelace
    save_cookie: second_session

  - id: current_user_with_login
    request:
      method: GET
      path: /api/users/me
      client: browser_a
    expect:
      status: 200
      json_paths:
        user.name: Ada Lovelace
        user.email: "ada-{run_id}@example.com"

  - id: reject_untrusted_sign_out_origin
    request:
      method: DELETE
      path: /api/sessions/current
      client: browser_b
      headers:
        Origin: https://untrusted.example
    expect:
      status: 403
      no_set_cookie: true
      headers:
        Cache-Control: no-store
      json_paths:
        error.code: forbidden

  - id: second_browser_stays_authenticated_after_origin_rejection
    request:
      method: GET
      path: /api/users/me
      client: browser_b
    expect:
      status: 200
      json_paths:
        user.name: Ada Lovelace

  - id: sign_out_current_browser
    request:
      method: DELETE
      path: /api/sessions/current
      client: browser_a
      headers:
        Origin: http://127.0.0.1:5173
    expect:
      status: 204
      set_cookie: true
      headers:
        Cache-Control: no-store
      set_cookie_count: 3
      set_cookie_each_contains:
        - Max-Age=0
      set_cookie_contains:
        - shareslices_session=
        - better-auth.session_data=
        - better-auth.dont_remember=
      cookies_absent:
        - shareslices_session
      empty_body: true

  - id: revoked_cookie_is_unauthenticated
    request:
      method: GET
      path: /api/users/me
      cookie_ref: session
    expect:
      status: 401
      json_paths:
        error.code: unauthenticated

  - id: repeated_sign_out_is_unauthenticated
    request:
      method: DELETE
      path: /api/sessions/current
      client: browser_a
      headers:
        Origin: http://127.0.0.1:5173
    expect:
      status: 401
      headers:
        Cache-Control: no-store
      json_paths:
        error.code: unauthenticated

  - id: second_browser_remains_authenticated
    request:
      method: GET
      path: /api/users/me
      client: browser_b
    expect:
      status: 200
      json_paths:
        user.name: Ada Lovelace

  - id: sign_out_persistence_failure
    server: failure
    request:
      method: DELETE
      path: /api/sessions/current
      headers:
        Origin: http://127.0.0.1:5173
        Cookie: shareslices_session=contract-fixture-session
        X-Contract-Fixture: sign-out-revoke-failure
    expect:
      status: 500
      no_set_cookie: true
      headers:
        Cache-Control: no-store
      json_paths:
        error.code: internal_error
        error.message: Internal server error.

  - id: ready_database_unavailable
    server: failure
    request:
      method: GET
      path: /ready
    expect:
      status: 503
      json:
        status: not_ready
        checks:
          database:
            status: fail
            message: Database is not reachable.

  - id: register_internal_error
    server: failure
    request:
      method: POST
      path: /api/users
      json:
        name: Internal Failure
        email: "failure-{run_id}@example.com"
        password: "correct horse battery staple"
    expect:
      status: 500
      no_set_cookie: true
      json_paths:
        error.code: internal_error
        error.message: Internal server error.

  - id: login_internal_error
    server: failure
    request:
      method: POST
      path: /api/sessions
      json:
        email: "ada-{run_id}@example.com"
        password: "correct horse battery staple"
    expect:
      status: 500
      no_set_cookie: true
      json_paths:
        error.code: internal_error
        error.message: Internal server error.

  - id: current_user_internal_error
    server: failure
    request:
      method: GET
      path: /api/users/me
    expect:
      status: 500
      no_set_cookie: true
      json_paths:
        error.code: internal_error
        error.message: Internal server error.

  - id: smtp_register_requires_verification
    server: smtp
    request:
      method: POST
      path: /api/users
      json:
        name: SMTP User
        email: "smtp-{run_id}@example.com"
        password: initial-password
    expect:
      status: 202
      no_set_cookie: true
      json_paths:
        verification.expiresIn: 600
    save:
      smtp_registration_verification_id: verification.id

  - id: smtp_verify_registration_with_delivered_code
    server: smtp
    request:
      method: POST
      path: /api/email-verifications/$saved.smtp_registration_verification_id/verify
      mailpit_code_for: "smtp-{run_id}@example.com"
      mailpit_subject: Verify your ShareSlices email
      json:
        code: $mailpit_code
    expect:
      status: 200
      no_set_cookie: true
      json:
        verified: true

  - id: smtp_request_password_reset
    server: smtp
    request:
      method: POST
      path: /api/password-reset-attempts
      json:
        email: "smtp-{run_id}@example.com"
    expect:
      status: 202
      no_set_cookie: true
      json_paths:
        verification.expiresIn: 600
    save:
      smtp_password_reset_attempt_id: verification.id

  - id: smtp_verify_password_reset_with_delivered_code
    server: smtp
    request:
      method: POST
      path: /api/password-reset-attempts/$saved.smtp_password_reset_attempt_id/verify
      mailpit_code_for: "smtp-{run_id}@example.com"
      mailpit_subject: Reset your ShareSlices password
      json:
        code: $mailpit_code
    expect:
      status: 200
      no_set_cookie: true
      json_paths:
        expiresIn: 600
    save:
      smtp_reset_grant: resetGrant

  - id: smtp_complete_password_reset
    server: smtp
    request:
      method: POST
      path: /api/password-resets
      json:
        resetGrant: $saved.smtp_reset_grant
        password: replacement-password
        confirmPassword: replacement-password
    expect:
      status: 200
      no_set_cookie: true
      json:
        reset: true

  - id: smtp_login_with_replacement_password
    server: smtp
    request:
      method: POST
      path: /api/sessions
      json:
        email: "smtp-{run_id}@example.com"
        password: replacement-password
    expect:
      status: 201
      set_cookie: true
      json_paths:
        signedIn: true
