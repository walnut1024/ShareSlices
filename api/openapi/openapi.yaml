          $ref: "#/components/schemas/Artifact"
    Artifact:
      type: object
      additionalProperties: false
      example:
        id: artifact-example
        name: Quarterly report
        uploadSessionId: upload-example
        processingState: ready
        shareLink:
          url: https://view.example.com/a/W7e4jPFm3p8r7YEh2xQn2g/
          state: active
        readyVersion:
          id: version-example
          state: ready
        publication:
          id: publication-example
          versionId: version-example
          publishedAt: "2026-07-10T08:00:00Z"
        failure: null
        validationReport: null
        allowedActions: [rename, copy_share_link, preview, unpublish]
      required:
        - id
        - name
        - updatedAt
        - uploadSessionId
        - processingState
        - shareLink
        - allowedActions
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 128
        name:
          type: string
          minLength: 1
          maxLength: 120
        updatedAt:
          type: string
          format: date-time
        uploadSessionId:
          description: Current Upload session ID used for Retry when one exists.
          oneOf:
            - type: string
              minLength: 1
              maxLength: 128
            - type: "null"
        processingState:
          $ref: "#/components/schemas/ProcessingState"
        shareLink:
          $ref: "#/components/schemas/ShareLink"
        readyVersion:
          oneOf:
            - $ref: "#/components/schemas/VersionSummary"
            - type: "null"
        publication:
          oneOf:
            - $ref: "#/components/schemas/Publication"
            - type: "null"
        failure:
          oneOf:
            - $ref: "#/components/schemas/ProcessingFailure"
            - type: "null"
        validationReport:
          oneOf:
            - $ref: "#/components/schemas/ValidationReport"
            - type: "null"
        allowedActions:
          type: array
          uniqueItems: true
          items:
            type: string
            enum:
              - rename
              - retry
              - replace_file
              - preview
              - publish
              - unpublish
              - copy_share_link
              - export
              - delete
    ProcessingState:
      type: string
      enum:
        - accepted
        - processing
        - ready
        - failed
    ShareLink:
      type: object
      additionalProperties: false
      required:
        - url
        - state
      properties:
        url:
          type: string
          format: uri
        state:
          type: string
          description: Effective state; an active stored link is reported as expired after its expiration instant.
          enum:
            - active
            - expired
            - retired
        expiresAt:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
    VersionSummary:
      type: object
      additionalProperties: false
