          minLength: 1
        state:
          type: string
          enum:
            - ready
    ReadyVersionListResponse:
      type: object
      additionalProperties: false
      required:
        - versions
      properties:
        versions:
          type: array
          items:
            $ref: "#/components/schemas/ReadyVersionListItem"
    ReadyVersionListItem:
      type: object
      additionalProperties: false
      required:
        - id
        - versionNumber
        - state
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 128
        versionNumber:
          type: integer
          minimum: 1
        state:
          type: string
          enum:
            - ready
    ProcessingFailure:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - recoverable
      properties:
        code:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
        message:
          type: string
          minLength: 1
        recoverable:
          type: boolean
    ValidationDetails:
      type: object
      additionalProperties: false
      properties:
        path:
          type: string
        paths:
          type: array
          items:
            type: string
        candidates:
          type: array
          items:
            type: string
        extension:
          type: string
        validationKind:
          type: string
        actualBytes:
          oneOf:
            - type: integer
              format: int64
              minimum: 0
              maximum: 9007199254740991
            - type: string
              pattern: "^(0|[1-9][0-9]*)$"
        limitBytes:
          oneOf:
            - type: integer
              format: int64
              minimum: 0
              maximum: 9007199254740991
            - type: string
              pattern: "^(0|[1-9][0-9]*)$"
        actualCount:
          oneOf:
            - type: integer
              format: int64
              minimum: 0
              maximum: 9007199254740991
            - type: string
              pattern: "^(0|[1-9][0-9]*)$"
        limitCount:
          oneOf:
            - type: integer
              format: int64
              minimum: 0
              maximum: 9007199254740991
            - type: string
              pattern: "^(0|[1-9][0-9]*)$"
        ignoredCount:
          oneOf:
            - type: integer
              format: int64
              minimum: 0
              maximum: 9007199254740991
            - type: string
              pattern: "^(0|[1-9][0-9]*)$"
        directory:
          type: string
        entryFile:
          type: string
    ValidationNotice:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - action
        - details
      properties:
        code:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
        message:
          type: string
          minLength: 1
        action:
          oneOf:
            - type: string
              minLength: 1
            - type: "null"
        details:
          $ref: "#/components/schemas/ValidationDetails"
    ValidationReport:
      type: object
      additionalProperties: false
      required:
        - primaryIssue
        - issues
        - warnings
      properties:
        primaryIssue:
          oneOf:
            - $ref: "#/components/schemas/ValidationNotice"
            - type: "null"
        issues:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/ValidationNotice"
        warnings:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/ValidationNotice"
    CreatePublicationRequest:
      type: object
      additionalProperties: false
      required:
        - versionId
      properties:
        versionId:
          type: string
          minLength: 1
          maxLength: 128
    PublicationResponse:
      type: object
      additionalProperties: false
      example:
        publication:
          id: publication-example
          versionId: version-example
          publishedAt: "2026-07-10T08:00:00Z"
      required:
        - publication
      properties:
        publication:
          $ref: "#/components/schemas/Publication"
    Publication:
      type: object
      additionalProperties: false
      required:
        - id
        - versionId
        - publishedAt
      properties:
        id:
          type: string
          minLength: 1
        versionId:
          type: string
          minLength: 1
        publishedAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
    ErrorBody:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - requestId
      properties:
        code:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
        message:
          type: string
          minLength: 1
        requestId:
          type: string
          minLength: 1
          description: Stable request identifier matching the X-Request-Id response header.
        action:
          type: string
          minLength: 1
        details:
          $ref: "#/components/schemas/ValidationDetails"
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
    FieldError:
      type: object
      additionalProperties: false
      required:
        - path
        - code
        - message
      properties:
        path:
          type: string
          minLength: 1
        code:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
        message:
          type: string
          minLength: 1
