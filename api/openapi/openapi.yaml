openapi: 3.1.0
info:
  title: ShareSlices API
  summary: ShareSlices account and Artifact HTTP API contract.
  description: >
    This OpenAPI document describes the current ShareSlices HTTP API contract
    for account entry and the version 0.0.1 Artifact upload, Preview, Publish,
    and Viewer flow, including current-browser-session sign out. Password
    recovery, email verification, additional account sign-in methods, link
    rotation, private sharing, and administration are outside this contract.

    The 429 responses are reserved for a future rate limiting change and are
    not implemented; contract tests exclude them until that change ships.
  version: 0.0.1
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /
    description: Same-origin API server.
tags:
  - name: system
    description: Process health and readiness checks.
  - name: users
    description: ShareSlices user account entry operations.
  - name: sessions
    description: Browser signed-in state operations.
  - name: cli-auth
    description: Interactive CLI browser authorization and CLI Session operations.
  - name: artifacts
    description: Signed-in Artifact management operations.
  - name: upload-policies
    description: Advisory upload preflight configuration.
  - name: publications
    description: Artifact publication operations.
  - name: preview
    description: Owner-only ready-Version content.
  - name: viewer
    description: Public Share-link pages and committed assets.
security: []
paths:
  /health:
    get:
      tags:
        - system
      operationId: getHealth
      summary: Read process liveness.
      responses:
        "200":
          description: The API process is alive.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    status: ok
                    service: shareslices-api
  /ready:
    get:
      tags:
        - system
      operationId: getReadiness
      summary: Read dependency readiness.
      responses:
        "200":
          description: The API is ready to serve account entry traffic.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              examples:
                ready:
                  value:
                    status: ready
                    checks:
                      database:
                        status: pass
        "503":
          description: The API process is alive but one or more dependencies are not ready.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              examples:
                databaseUnavailable:
                  value:
                    status: not_ready
                    checks:
                      database:
                        status: fail
                        message: Database is not reachable.
  /api/users:
    post:
      tags:
        - users
      operationId: createUser
      summary: Register a ShareSlices user.
      description: >
        Creates a ShareSlices user account from name, email, and password.
        Successful registration does not create signed-in state and must not
        set an authenticated session cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
            examples:
              valid:
                value:
                  name: Ada Lovelace
                  email: ada@example.com
                  password: correct horse battery staple
      responses:
        "201":
          description: User account created. No signed-in state is created.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
              examples:
                created:
                  value:
                    user:
                      id: user_000000000000000000000000
                      name: Ada Lovelace
                      email: ada@example.com
        "202":
          description: Registration accepted and email verification is required.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationState"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          $ref: "#/components/responses/EmailAlreadyRegistered"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/email-verifications/{verificationId}/deliveries:
    post:
      tags: [users]
      operationId: createEmailVerificationDelivery
      summary: Request another registration verification email.
      parameters:
        - $ref: "#/components/parameters/VerificationId"
      responses:
        "202":
          description: Delivery accepted or already pending during the server waiting period.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationState"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/email-verifications/{verificationId}/verify:
    post:
      tags: [users]
      operationId: verifyRegistrationEmail
      summary: Verify a registration email code.
      parameters:
        - $ref: "#/components/parameters/VerificationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationCodeRequest"
      responses:
        "200":
          description: Email verified without creating a Session.
          content:
            application/json:
              schema:
                type: object
                required: [verified]
                properties:
                  verified:
                    type: boolean
                    const: true
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/password-reset-attempts:
    post:
      tags: [users]
      operationId: createPasswordResetAttempt
      summary: Request a neutral password-reset attempt.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "202":
          description: Neutral accepted response for registered and unregistered emails.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationState"
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/password-reset-attempts/{attemptId}/verify:
    post:
      tags: [users]
      operationId: verifyPasswordResetAttempt
      summary: Verify a password-reset email code.
      parameters:
        - name: attemptId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationCodeRequest"
      responses:
        "200":
          description: Restricted reset grant created.
          content:
            application/json:
              schema:
                type: object
                required: [resetGrant, expiresIn]
                properties:
                  resetGrant:
                    type: string
                  expiresIn:
                    type: integer
                    const: 600
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/password-resets:
    post:
      tags: [users]
      operationId: createPasswordReset
      summary: Set a new password using a restricted reset grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [resetGrant, password, confirmPassword]
              properties:
                resetGrant:
                  type: string
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                confirmPassword:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        "200":
          description: Password changed and existing Sessions revoked.
          content:
            application/json:
              schema:
                type: object
                required: [reset]
                properties:
                  reset:
                    type: boolean
                    const: true
        "400":
          $ref: "#/components/responses/InvalidRequest"
  /api/sessions:
    post:
      tags:
        - sessions
      operationId: createSession
      summary: Log in with email and password.
      description: >
        Creates signed-in browser state only when the submitted email and
        password are valid. Wrong-password and unknown-email failures are
        intentionally indistinguishable.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
            examples:
              valid:
                value:
                  email: ada@example.com
                  password: correct horse battery staple
      responses:
        "201":
          description: Signed-in state created.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
            Set-Cookie:
              description: >
                Authenticated browser session cookie. The cookie must be
                HttpOnly, Secure in production, SameSite=Lax or stricter, and
                scoped to the application path.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponse"
              examples:
                signedIn:
                  value:
                    signedIn: true
                    user:
                      id: user_000000000000000000000000
                      name: Ada Lovelace
                      email: ada@example.com
        "202":
          description: Credentials accepted but registration email verification is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationState"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/InvalidLogin"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/sessions/current:
    delete:
      tags:
        - sessions
      operationId: deleteCurrentSession
      summary: Sign out of the current browser Session.
      description: >
        Revokes only the Session identified by the authenticated browser
        cookie, expires every current-Session cookie, and leaves other Sessions
        active. A repeated request after revocation is unauthenticated.
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Current Session revoked and its cookies expired.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
            Set-Cookie:
              description: >
                Repeated once for each current-Session cookie that the browser
                must expire.
              schema:
                type: string
            Cache-Control:
              $ref: "#/components/headers/NoStore"
        "401":
          $ref: "#/components/responses/CurrentSessionUnauthenticated"
        "403":
          $ref: "#/components/responses/CurrentSessionForbidden"
        "500":
          $ref: "#/components/responses/CurrentSessionInternalError"
  /api/cli-authorizations:
    post:
      tags:
        - cli-auth
      operationId: createCliAuthorization
      summary: Start interactive browser authorization for the ShareSlices CLI.
      parameters:
        - $ref: "#/components/parameters/CliVersion"
        - $ref: "#/components/parameters/CliOperatingSystem"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCliAuthorizationRequest"
      responses:
        "201":
          description: Short-lived authorization created.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CliAuthorizationCreatedResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "426":
          $ref: "#/components/responses/CliUpgradeRequired"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/cli-authorizations/{userCode}:
    parameters:
      - $ref: "#/components/parameters/UserCode"
    get:
      tags:
        - cli-auth
      operationId: getCliAuthorization
      summary: Validate and claim a pending CLI authorization.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Authorization state returned and claimed by the current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CliAuthorizationResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/cli-authorizations/{userCode}:approve:
    parameters:
      - $ref: "#/components/parameters/UserCode"
    post:
      tags:
        - cli-auth
      operationId: approveCliAuthorization
      summary: Approve a claimed CLI authorization.
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Authorization approved.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/cli-authorizations/{userCode}:deny:
    parameters:
      - $ref: "#/components/parameters/UserCode"
    post:
      tags:
        - cli-auth
      operationId: denyCliAuthorization
      summary: Deny a claimed CLI authorization.
      security:
        - sessionCookie: []
      responses:
        "204":
          description: Authorization denied.
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/cli-sessions:
    post:
      tags:
        - cli-auth
      operationId: createCliSession
      summary: Poll or exchange a device code for an independent CLI Session.
      parameters:
        - $ref: "#/components/parameters/CliVersion"
        - $ref: "#/components/parameters/CliOperatingSystem"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCliSessionRequest"
      responses:
        "201":
          description: CLI Session created. The response is never cacheable.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CliSessionCreatedResponse"
        "400":
          $ref: "#/components/responses/DeviceAuthorizationIncomplete"
        "426":
          $ref: "#/components/responses/CliUpgradeRequired"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/cli-sessions/current:
    delete:
      tags:
        - cli-auth
      operationId: deleteCurrentCliSession
      summary: Sign out only the calling CLI Session.
      parameters:
        - $ref: "#/components/parameters/CliVersion"
        - $ref: "#/components/parameters/CliOperatingSystem"
      security:
        - sessionBearer: []
      responses:
        "204":
          description: Current CLI Session revoked.
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "426":
          $ref: "#/components/responses/CliUpgradeRequired"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/users/me:
    get:
      tags:
        - users
      operationId: getCurrentUser
      summary: Read the current ShareSlices user.
      description: >
        Verifies signed-in state and returns ShareSlices user identity without
        exposing authentication-library internals.
      security:
        - sessionCookie: []
        - sessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CliVersionWhenBearer"
        - $ref: "#/components/parameters/CliOperatingSystemWhenBearer"
        - name: publication
          in: query
          schema:
            type: string
            enum: [published, unpublished]
        - name: processing
          in: query
          schema:
            $ref: "#/components/schemas/ProcessingState"
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: pageToken
          in: query
          description: Opaque token returned by the preceding list response.
          schema:
            type: string
      responses:
        "200":
          description: Signed-in state is valid.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
              examples:
                currentUser:
                  value:
                    user:
                      id: user_000000000000000000000000
                      name: Ada Lovelace
                      email: ada@example.com
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/artifact-upload-policies/current:
    get:
      tags:
        - upload-policies
      operationId: getCurrentArtifactUploadPolicy
      summary: Read the active upload policy for optional preflight.
      security:
        - sessionCookie: []
        - sessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CliVersionWhenBearer"
        - $ref: "#/components/parameters/CliOperatingSystemWhenBearer"
      responses:
        "200":
          description: Active upload policy returned.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadPolicyResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/artifacts:
    get:
      tags:
        - artifacts
      operationId: listArtifacts
      summary: List Artifacts owned by the current user.
      security:
        - sessionCookie: []
        - sessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CliVersionWhenBearer"
        - $ref: "#/components/parameters/CliOperatingSystemWhenBearer"
      responses:
        "200":
          description: Owned Artifacts returned.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactListResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - artifacts
      operationId: createArtifact
      summary: Create an Artifact from a name and ZIP.
      description: >
        Streams the ZIP to private storage before creating the Artifact,
        Upload session, Share link, and processing job.
      security:
        - sessionCookie: []
        - sessionBearer: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CliVersionWhenBearer"
        - $ref: "#/components/parameters/CliOperatingSystemWhenBearer"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateArtifactRequest"
      responses:
        "202":
          description: Upload accepted for asynchronous processing.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactAcceptedResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "409":
          $ref: "#/components/responses/OperationConflict"
        "413":
          $ref: "#/components/responses/UploadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/artifacts/{artifactId}:
    parameters:
      - $ref: "#/components/parameters/ArtifactId"
    get:
      tags:
        - artifacts
      operationId: getArtifact
      summary: Read one owned Artifact and its current management state.
      security:
        - sessionCookie: []
        - sessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CliVersionWhenBearer"
        - $ref: "#/components/parameters/CliOperatingSystemWhenBearer"
      responses:
        "200":
          description: Owned Artifact returned.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/ArtifactNotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags:
        - artifacts
      operationId: updateArtifact
      summary: Change an Artifact's mutable name.
      security:
        - sessionCookie: []
        - sessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CliVersionWhenBearer"
        - $ref: "#/components/parameters/CliOperatingSystemWhenBearer"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateArtifactRequest"
      responses:
        "200":
          description: Artifact name updated without changing its identity.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/ArtifactNotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - artifacts
      operationId: deleteArtifact
      summary: Permanently delete an eligible owned Artifact.
      description: >
        Irreversibly removes the Artifact graph and associated stored content. The Server rejects
        deletion while an Upload is accepted or processing. Clients must not automatically retry
        when the result of this mutation is indeterminate.
      security:
        - sessionCookie: []
        - sessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CliVersionWhenBearer"
        - $ref: "#/components/parameters/CliOperatingSystemWhenBearer"
      responses:
        "204":
          description: Artifact and associated stored content deleted.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/ArtifactNotFound"
        "409":
          $ref: "#/components/responses/OperationConflict"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/artifacts/{artifactId}/versions:
    parameters:
      - $ref: "#/components/parameters/ArtifactId"
    get:
      tags:
        - artifacts
      operationId: listArtifactVersions
      summary: List ready Versions of one owned Artifact.
      security:
        - sessionCookie: []
        - sessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CliVersionWhenBearer"
        - $ref: "#/components/parameters/CliOperatingSystemWhenBearer"
      responses:
        "200":
          description: Ready Versions returned in descending Version-number order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyVersionListResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/ArtifactNotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/artifacts/{artifactId}/share-link:
    parameters:
      - $ref: "#/components/parameters/ArtifactId"
    patch:
      tags:
        - artifacts
      operationId: updateArtifactShareLink
      summary: Set or clear the stable Share link expiration.
      security:
        - sessionCookie: []
        - sessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CliVersionWhenBearer"
        - $ref: "#/components/parameters/CliOperatingSystemWhenBearer"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShareLinkRequest"
      responses:
        "200":
          description: Share link expiration updated without changing its slug or Publication.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/ArtifactNotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/artifacts/{artifactId}/upload-sessions:
    parameters:
      - $ref: "#/components/parameters/ArtifactId"
    post:
      tags:
        - artifacts
      operationId: createArtifactUploadSession
      summary: Upload a new Version or replace failed input before the first ready Version.
      security:
        - sessionCookie: []
        - sessionBearer: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CliVersionWhenBearer"
        - $ref: "#/components/parameters/CliOperatingSystemWhenBearer"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ReplaceArtifactFileRequest"
      responses:
        "202":
          description: Upload session accepted for asynchronous processing.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactAcceptedResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/ArtifactNotFound"
        "409":
          $ref: "#/components/responses/OperationConflict"
        "413":
          $ref: "#/components/responses/UploadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/upload-sessions/{uploadSessionId}:retry:
    parameters:
      - $ref: "#/components/parameters/UploadSessionId"
    post:
      tags:
        - artifacts
      operationId: retryUploadSession
      summary: Retry a recoverable failed Upload session.
      security:
        - sessionCookie: []
        - sessionBearer: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CliVersionWhenBearer"
        - $ref: "#/components/parameters/CliOperatingSystemWhenBearer"
      responses:
        "202":
          description: Retry accepted.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactAcceptedResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/UploadSessionNotFound"
        "409":
          $ref: "#/components/responses/OperationConflict"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/versions/{versionId}/content/:
    parameters:
      - $ref: "#/components/parameters/VersionId"
    get:
      tags:
        - preview
      operationId: previewVersionEntry
      summary: Preview a ready Version's root entry file.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Ready root entry streamed with caching disabled.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            text/html:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/VersionNotFound"
        "409":
          $ref: "#/components/responses/VersionNotReady"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/versions/{versionId}/export:
    parameters:
      - $ref: "#/components/parameters/VersionId"
    get:
      tags:
        - artifacts
      operationId: exportArtifactVersion
      summary: Download an owned ready Version as a ZIP.
      security:
        - sessionCookie: []
        - sessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CliVersionWhenBearer"
        - $ref: "#/components/parameters/CliOperatingSystemWhenBearer"
        - name: artifactId
          in: query
          required: false
          description: Optional owning Artifact constraint used by CLI Export.
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: ZIP assembled from committed Version assets.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
            Content-Disposition:
              description: Safe attachment filename derived from the Artifact name.
              schema:
                type: string
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/VersionNotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/versions/{versionId}/content/{assetPath}:
    parameters:
      - $ref: "#/components/parameters/VersionId"
      - $ref: "#/components/parameters/AssetPath"
    get:
      tags:
        - preview
      operationId: previewVersionAsset
      summary: Preview one normalized committed manifest asset.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Manifest asset streamed with its recorded content type.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/AssetNotFound"
        "409":
          $ref: "#/components/responses/VersionNotReady"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/artifacts/{artifactId}/publications:
    parameters:
      - $ref: "#/components/parameters/ArtifactId"
    post:
      tags:
        - publications
      operationId: createPublication
      summary: Publish a ready Version atomically.
      security:
        - sessionCookie: []
        - sessionBearer: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CliVersionWhenBearer"
        - $ref: "#/components/parameters/CliOperatingSystemWhenBearer"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePublicationRequest"
      responses:
        "201":
          description: Publication created or original idempotent result returned.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/ArtifactNotFound"
        "409":
          $ref: "#/components/responses/OperationConflict"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/artifacts/{artifactId}/publications/{publicationId}:
    parameters:
      - $ref: "#/components/parameters/ArtifactId"
      - $ref: "#/components/parameters/PublicationId"
    delete:
      tags:
        - publications
      operationId: deletePublication
      summary: Unpublish while retaining the active Share link.
      security:
        - sessionCookie: []
        - sessionBearer: []
      parameters:
        - $ref: "#/components/parameters/CliVersionWhenBearer"
        - $ref: "#/components/parameters/CliOperatingSystemWhenBearer"
      responses:
        "204":
          description: Artifact is unpublished; repeated deletes have the same effect.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/ArtifactNotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /a/{shareSlug}/:
    parameters:
      - $ref: "#/components/parameters/ShareSlug"
    get:
      tags:
        - viewer
      operationId: getSharedArtifactEntry
      summary: View published content or the known Share-link state.
      responses:
        "200":
          description: Published entry content or an unpublished state page.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            text/html:
              schema:
                type: string
        "410":
          description: Known Share link is expired or retired.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Share link is unknown.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            text/html:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalError"
  /a/{shareSlug}/{assetPath}:
    parameters:
      - $ref: "#/components/parameters/ShareSlug"
      - $ref: "#/components/parameters/AssetPath"
    get:
      tags:
        - viewer
      operationId: getSharedArtifactAsset
      summary: Stream one normalized asset from the current Publication.
      responses:
        "200":
          description: Manifest asset streamed with its recorded content type.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Share link or normalized manifest asset is unknown.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            text/html:
              schema:
                type: string
        "410":
          description: Known Share link is expired or retired.
          headers:
            Cache-Control:
              $ref: "#/components/headers/NoStore"
          content:
            text/html:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: shareslices_session
      description: Browser session cookie established by successful email/password login.
    sessionBearer:
      type: http
      scheme: bearer
      description: Opaque independently revocable CLI Session credential.
  parameters:
    VerificationId:
      name: verificationId
      in: path
      required: true
      description: Opaque email verification identifier.
      schema:
        type: string
        minLength: 1
    CliVersion:
      name: ShareSlices-CLI-Version
      in: header
      required: true
      schema:
        type: string
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
      description: Semantic version of the current ShareSlices CLI process; not persisted.
    CliOperatingSystem:
      name: ShareSlices-CLI-OS
      in: header
      required: true
      schema:
        type: string
        enum: [linux, macos, windows]
      description: Coarse operating-system identifier used for compatibility; not persisted.
    CliVersionWhenBearer:
      name: ShareSlices-CLI-Version
      in: header
      required: false
      schema:
        type: string
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
      description: Required when the selected security scheme is sessionBearer; not persisted.
    CliOperatingSystemWhenBearer:
      name: ShareSlices-CLI-OS
      in: header
      required: false
      schema:
        type: string
        enum: [linux, macos, windows]
      description: Required when the selected security scheme is sessionBearer; not persisted.
    UserCode:
      name: userCode
      in: path
      required: true
      schema:
        type: string
        pattern: "^[A-Z2-9]{4}-?[A-Z2-9]{4}$"
    ArtifactId:
      name: artifactId
      in: path
      required: true
      description: Stable Artifact ID.
      schema:
        type: string
        minLength: 1
        maxLength: 128
    UploadSessionId:
      name: uploadSessionId
      in: path
      required: true
      description: Stable Upload session ID.
      schema:
        type: string
        minLength: 1
        maxLength: 128
    VersionId:
      name: versionId
      in: path
      required: true
      description: Stable immutable Version ID.
      schema:
        type: string
        minLength: 1
        maxLength: 128
    PublicationId:
      name: publicationId
      in: path
      required: true
      description: Stable Publication ID.
      schema:
        type: string
        minLength: 1
        maxLength: 128
    ShareSlug:
      name: shareSlug
      in: path
      required: true
      description: Opaque active or historical Share-link slug.
      schema:
        type: string
        minLength: 20
        maxLength: 64
        pattern: "^[A-Za-z0-9_-]+$"
    AssetPath:
      name: assetPath
      in: path
      required: true
      description: >
        Greedy relative Artifact path. The server decodes, normalizes, and
        resolves it only against the committed manifest.
      schema:
        type: string
        minLength: 1
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Caller-generated key scoped to the signed-in owner and operation.
      schema:
        type: string
        minLength: 1
        maxLength: 255
  headers:
    RequestId:
      description: Stable request identifier for logs and support.
      schema:
        type: string
        minLength: 1
    RetryAfter:
      description: Seconds the client should wait before retrying.
      schema:
        type: integer
        minimum: 1
    NoStore:
      description: Prevents storage of sensitive or state-dependent responses.
      required: true
      schema:
        type: string
        enum:
          - no-store
  responses:
    Forbidden:
      description: The authenticated user cannot perform this operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            forbidden:
              value:
                error:
                  code: forbidden
                  message: Request is not allowed.
                  requestId: req_000000000000000000000000
    CliUpgradeRequired:
      description: The CLI is missing compatible metadata or must be upgraded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            upgrade:
              value:
                error:
                  code: cli_upgrade_required
                  message: Update ShareSlices CLI to continue.
                  action: Update ShareSlices CLI to 0.1.0 or newer.
                  requestId: req_000000000000000000000000
                  details:
                    currentVersion: 0.0.9
                    minimumVersion: 0.1.0
    DeviceAuthorizationIncomplete:
      description: Authorization is pending, slowed, expired, denied, or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            pending:
              value:
                error:
                  code: authorization_pending
                  message: Authorization is still pending.
                  requestId: req_000000000000000000000000
    InvalidRequest:
      description: The request shape or field values are invalid.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidEmail:
              value:
                error:
                  code: invalid_request
                  message: Invalid request.
                  requestId: req_000000000000000000000000
                  fields:
                    - path: email
                      code: invalid_email
                      message: Enter a valid email.
    EmailAlreadyRegistered:
      description: An account already exists for the normalized email.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            duplicateEmail:
              value:
                error:
                  code: email_already_registered
                  message: An account already exists for this email.
                  requestId: req_000000000000000000000000
    InvalidLogin:
      description: Neutral login failure for wrong password or unknown email.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            neutralFailure:
              value:
                error:
                  code: invalid_login
                  message: Email or password is incorrect.
                  requestId: req_000000000000000000000000
    Unauthenticated:
      description: Signed-in state is missing or invalid.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            unauthenticated:
              value:
                error:
                  code: unauthenticated
                  message: Sign in to continue.
                  requestId: req_000000000000000000000000
    CurrentSessionUnauthenticated:
      description: Current signed-in state is missing or invalid.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            unauthenticated:
              value:
                error:
                  code: unauthenticated
                  message: Sign in to continue.
                  requestId: req_000000000000000000000000
    CurrentSessionForbidden:
      description: The sign-out request origin is not allowed.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            forbidden:
              value:
                error:
                  code: forbidden
                  message: Request origin is not allowed.
                  requestId: req_000000000000000000000000
    CurrentSessionInternalError:
      description: Current-Session sign out encountered an unexpected failure.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            internalError:
              value:
                error:
                  code: internal_error
                  message: Internal server error.
                  requestId: req_000000000000000000000000
    ArtifactNotFound:
      description: Artifact is unknown or is not owned by the current user.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notFound:
              value:
                error:
                  code: artifact_not_found
                  message: Artifact not found.
                  requestId: req_000000000000000000000000
    UploadSessionNotFound:
      description: Upload session is unknown or is not owned by the current user.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notFound:
              value:
                error:
                  code: upload_session_not_found
                  message: Upload session not found.
                  requestId: req_000000000000000000000000
    VersionNotFound:
      description: Version is unknown or is not owned by the current user.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notFound:
              value:
                error:
                  code: version_not_found
                  message: Version not found.
                  requestId: req_000000000000000000000000
    AssetNotFound:
      description: Normalized asset is absent from the committed Version manifest.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notFound:
              value:
                error:
                  code: asset_not_found
                  message: Asset not found.
                  requestId: req_000000000000000000000000
    VersionNotReady:
      description: Version exists but has not reached the ready state.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notReady:
              value:
                error:
                  code: version_not_ready
                  message: Version is not ready.
                  requestId: req_000000000000000000000000
    OperationConflict:
      description: >
        Mutation conflicts with current state, is still in progress, or
        reuses an idempotency key with different input.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            inProgress:
              value:
                error:
                  code: operation_in_progress
                  message: Operation is still in progress.
                  requestId: req_000000000000000000000000
            idempotencyConflict:
              value:
                error:
                  code: idempotency_conflict
                  message: Idempotency key was used with different input.
                  requestId: req_000000000000000000000000
            invalidState:
              value:
                error:
                  code: invalid_artifact_state
                  message: Artifact state does not allow this operation.
                  requestId: req_000000000000000000000000
    UploadTooLarge:
      description: Streamed ZIP exceeded the active archive-size limit.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            tooLarge:
              value:
                error:
                  code: archive_too_large
                  message: ZIP exceeds the upload limit.
                  action: Reduce the ZIP below the upload limit and try again.
                  details:
                    limitBytes: 52428800
                  requestId: req_000000000000000000000000
    RateLimited:
      description: >
        The request was rejected because the protected operation exceeded a
        server-owned delivery or attempt limit.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            rateLimited:
              value:
                error:
                  code: rate_limited
                  message: Too many attempts. Try again later.
                  requestId: req_000000000000000000000000
    InternalError:
      description: The API encountered an unexpected failure.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            internalError:
              value:
                error:
                  code: internal_error
                  message: Internal server error.
                  requestId: req_000000000000000000000000
  schemas:
    VerificationState:
      type: object
      additionalProperties: false
      required: [verification]
      properties:
        verification:
          type: object
          additionalProperties: false
          required: [id, destination, expiresIn, resendAvailableIn]
          properties:
            id:
              type: string
            destination:
              type: string
              description: Masked email destination.
            expiresIn:
              type: integer
              const: 600
            resendAvailableIn:
              type: integer
              minimum: 0
    VerificationCodeRequest:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
          pattern: "^[0-9 ]{6,7}$"
    CreateCliAuthorizationRequest:
      type: object
      additionalProperties: false
      required: [clientId]
      properties:
        clientId:
          type: string
          const: shareslices-cli
    CliAuthorizationCreatedResponse:
      type: object
      additionalProperties: false
      required: [authorization]
      properties:
        authorization:
          type: object
          additionalProperties: false
          required: [deviceCode, userCode, verificationUri, verificationUriComplete, expiresIn, interval]
          properties:
            deviceCode:
              type: string
            userCode:
              type: string
            verificationUri:
              type: string
              format: uri
            verificationUriComplete:
              type: string
              format: uri
            expiresIn:
              type: integer
              minimum: 1
            interval:
              type: integer
              minimum: 1
    CliAuthorizationResponse:
      type: object
      additionalProperties: false
      required: [authorization]
      properties:
        authorization:
          type: object
          additionalProperties: false
          required: [userCode, status]
          properties:
            userCode:
              type: string
            status:
              type: string
              enum: [pending, approved, denied]
    CreateCliSessionRequest:
      type: object
      additionalProperties: false
      required: [clientId, deviceCode]
      properties:
        clientId:
          type: string
          const: shareslices-cli
        deviceCode:
          type: string
          minLength: 1
    CliSessionCreatedResponse:
      type: object
      additionalProperties: false
      required: [session]
      properties:
        session:
          type: object
          additionalProperties: false
          required: [accessToken, tokenType, expiresIn]
          properties:
            accessToken:
              type: string
              minLength: 1
            tokenType:
              type: string
              const: Bearer
            expiresIn:
              type: integer
              minimum: 1
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          enum:
            - shareslices-api
    ReadinessResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - checks
      properties:
        status:
          type: string
          enum:
            - ready
            - not_ready
        checks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ReadinessCheck"
    ReadinessCheck:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - pass
            - fail
        message:
          type: string
          minLength: 1
    CreateUserRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
          description: Display name captured during registration.
        email:
          type: string
          format: email
          maxLength: 320
          description: Email sign-in identifier.
        password:
          type: string
          minLength: 8
          maxLength: 128
          format: password
          description: Email/password credential secret.
    CreateSessionRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 320
          description: Email sign-in identifier.
        password:
          type: string
          format: password
          minLength: 1
          maxLength: 128
          description: Email/password credential secret.
    CreateSessionResponse:
      type: object
      additionalProperties: false
      required:
        - signedIn
        - user
      properties:
        signedIn:
          type: boolean
          enum:
            - true
        user:
          $ref: "#/components/schemas/User"
    UserResponse:
      type: object
      additionalProperties: false
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 128
          description: Stable ShareSlices user ID.
        name:
          type: string
