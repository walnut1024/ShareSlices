      parameters: [{$ref: "#/components/parameters/IdempotencyKey"}]
      requestBody:
        required: true
        content:
          application/json: {schema: {$ref: "#/components/schemas/CreateGalleryCopyRequest"}}
      responses:
        "202": {$ref: "#/components/responses/GalleryCopyOperationRead"}
        "400": {$ref: "#/components/responses/InvalidRequest"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "404": {$ref: "#/components/responses/PublicGalleryNotFound"}
        "409": {$ref: "#/components/responses/GalleryConflict"}
        "410": {$ref: "#/components/responses/PublicGalleryGone"}
        "426": {$ref: "#/components/responses/CliUpgradeRequired"}
        "429": {$ref: "#/components/responses/RateLimited"}
        "503": {$ref: "#/components/responses/PublicGalleryUnavailable"}
  /api/gallery-copy-operations/{operationId}:
    parameters: [{$ref: "#/components/parameters/GalleryOperationId"}]
    get:
      tags: [gallery]
      operationId: getGalleryCopyOperation
      summary: Recover an accepted Save-a-copy operation by actor-bound identity.
      security: [{sessionCookie: []}, {sessionBearer: []}]
      responses:
        "200": {$ref: "#/components/responses/GalleryCopyOperationRead"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "404": {$ref: "#/components/responses/GalleryOperationNotFound"}
        "426": {$ref: "#/components/responses/CliUpgradeRequired"}
        "500": {$ref: "#/components/responses/InternalError"}
  /gallery-content/public/{playerAuthorization}/:
    parameters: [{$ref: "#/components/parameters/GalleryPlayerAuthorization"}]
    get:
      tags: [gallery-content]
      operationId: getGalleryContentEntry
      summary: Stream the credential-bound committed entry from the content-only runtime.
      responses:
        "200": {$ref: "#/components/responses/GalleryContentRead"}
        "404": {$ref: "#/components/responses/PublicGalleryNotFound"}
        "503": {$ref: "#/components/responses/PublicGalleryUnavailable"}
  /gallery-content/public/{playerAuthorization}/{assetPath}:
    parameters:
      - {$ref: "#/components/parameters/GalleryPlayerAuthorization"}
      - {$ref: "#/components/parameters/AssetPath"}
    get:
      tags: [gallery-content]
      operationId: getGalleryContentAsset
      summary: Stream one normalized credential-bound manifest asset.
      responses:
        "200": {$ref: "#/components/responses/GalleryContentRead"}
        "404": {$ref: "#/components/responses/PublicGalleryNotFound"}
        "503": {$ref: "#/components/responses/PublicGalleryUnavailable"}
  /gallery-content/review/{reviewAuthorization}/:
    parameters: [{$ref: "#/components/parameters/GalleryReviewAuthorization"}]
    get:
      tags: [gallery-content]
      operationId: getGalleryReviewContentEntry
      summary: Stream a case-bound candidate entry using a distinct review credential.
      responses:
        "200": {$ref: "#/components/responses/GalleryContentRead"}
        "404": {$ref: "#/components/responses/PublicGalleryNotFound"}
        "503": {$ref: "#/components/responses/GalleryGovernanceUnavailable"}
  /gallery-content/review/{reviewAuthorization}/{assetPath}:
    parameters:
      - {$ref: "#/components/parameters/GalleryReviewAuthorization"}
      - {$ref: "#/components/parameters/AssetPath"}
    get:
      tags: [gallery-content]
      operationId: getGalleryReviewContentAsset
      summary: Stream one normalized case-bound candidate asset.
      responses:
        "200": {$ref: "#/components/responses/GalleryContentRead"}
        "404": {$ref: "#/components/responses/PublicGalleryNotFound"}
        "503": {$ref: "#/components/responses/GalleryGovernanceUnavailable"}
  /api/gallery/notifications:
    get:
      tags: [gallery-governance]
      operationId: listOwnGalleryNotifications
      summary: Read only governance notifications addressed to the signed-in User.
      security: [{sessionCookie: []}, {sessionBearer: []}]
      parameters: [{$ref: "#/components/parameters/Cursor"}, {$ref: "#/components/parameters/PageLimit"}]
      responses:
        "200": {$ref: "#/components/responses/GalleryNotificationPageRead"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "426": {$ref: "#/components/responses/CliUpgradeRequired"}
        "500": {$ref: "#/components/responses/InternalError"}
        "503": {$ref: "#/components/responses/GalleryGovernanceUnavailable"}
  /api/admin/gallery/cases:
    get:
      tags: [gallery-governance]
      operationId: listGalleryGovernanceCases
      summary: List authorized proposal, report, removal, restriction, takedown, and Appeal work.
      security: [{sessionCookie: []}, {sessionBearer: []}]
      parameters:
        - {$ref: "#/components/parameters/Cursor"}
        - {$ref: "#/components/parameters/PageLimit"}
        - {name: queue, in: query, required: true, schema: {$ref: "#/components/schemas/GalleryGovernanceQueue"}}
      responses:
        "200": {$ref: "#/components/responses/GalleryGovernanceCasePageRead"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "426": {$ref: "#/components/responses/CliUpgradeRequired"}
        "500": {$ref: "#/components/responses/InternalError"}
        "503": {$ref: "#/components/responses/GalleryGovernanceUnavailable"}
  /api/admin/gallery/cases/{caseId}:
    parameters: [{$ref: "#/components/parameters/GalleryCaseId"}]
    get:
      tags: [gallery-governance]
      operationId: getGalleryGovernanceCase
      summary: Read immutable case snapshots, evidence, policy, deadline, and allowed decisions.
      security: [{sessionCookie: []}, {sessionBearer: []}]
      responses:
        "200": {$ref: "#/components/responses/GalleryGovernanceCaseRead"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/GalleryCaseNotFound"}
        "426": {$ref: "#/components/responses/CliUpgradeRequired"}
        "500": {$ref: "#/components/responses/InternalError"}
        "503": {$ref: "#/components/responses/GalleryGovernanceUnavailable"}
  /api/admin/gallery/cases/{caseId}/review-authorizations:
    parameters: [{$ref: "#/components/parameters/GalleryCaseId"}]
    post:
      tags: [gallery-governance]
      operationId: createGalleryReviewAuthorization
      summary: Issue a short-lived case-bound candidate review credential.
      security: [{sessionCookie: []}, {sessionBearer: []}]
      responses:
        "201": {$ref: "#/components/responses/GalleryReviewAuthorizationRead"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/GalleryCaseNotFound"}
        "409": {$ref: "#/components/responses/GalleryConflict"}
        "426": {$ref: "#/components/responses/CliUpgradeRequired"}
        "500": {$ref: "#/components/responses/InternalError"}
        "503": {$ref: "#/components/responses/GalleryGovernanceUnavailable"}
  /api/admin/gallery/cases/{caseId}/decisions:
    parameters: [{$ref: "#/components/parameters/GalleryCaseId"}]
    post:
      tags: [gallery-governance]
      operationId: createGalleryGovernanceDecision
      summary: Commit an idempotent Administrator decision with revision and policy evidence.
      security: [{sessionCookie: []}, {sessionBearer: []}]
      parameters: [{$ref: "#/components/parameters/IdempotencyKey"}]
      requestBody:
        required: true
        content:
          application/json: {schema: {$ref: "#/components/schemas/CreateGalleryGovernanceDecisionRequest"}}
      responses:
        "201": {$ref: "#/components/responses/GalleryGovernanceDecisionRead"}
        "400": {$ref: "#/components/responses/InvalidRequest"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/GalleryCaseNotFound"}
        "409": {$ref: "#/components/responses/GalleryConflict"}
        "426": {$ref: "#/components/responses/CliUpgradeRequired"}
        "500": {$ref: "#/components/responses/InternalError"}
        "503": {$ref: "#/components/responses/GalleryGovernanceUnavailable"}
  /api/admin/gallery/featured-positions/{position}:
    parameters: [{$ref: "#/components/parameters/GalleryFeaturedPosition"}]
    put:
      tags: [gallery-governance]
      operationId: setGalleryFeaturedPosition
      summary: Set one durable curated position to an eligible listing.
      security: [{sessionCookie: []}, {sessionBearer: []}]
      requestBody:
        required: true
        content:
          application/json: {schema: {$ref: "#/components/schemas/SetGalleryFeaturedPositionRequest"}}
      responses:
        "200": {$ref: "#/components/responses/GalleryFeaturedPositionRead"}
        "400": {$ref: "#/components/responses/InvalidRequest"}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/GalleryListingNotFound"}
        "409": {$ref: "#/components/responses/GalleryConflict"}
        "426": {$ref: "#/components/responses/CliUpgradeRequired"}
        "500": {$ref: "#/components/responses/InternalError"}
        "503": {$ref: "#/components/responses/GalleryGovernanceUnavailable"}
    delete:
      tags: [gallery-governance]
      operationId: clearGalleryFeaturedPosition
      summary: Clear one durable curated position without automatic return.
      security: [{sessionCookie: []}, {sessionBearer: []}]
      responses:
        "204": {description: Featured position cleared.}
        "401": {$ref: "#/components/responses/Unauthenticated"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "426": {$ref: "#/components/responses/CliUpgradeRequired"}
        "500": {$ref: "#/components/responses/InternalError"}
        "503": {$ref: "#/components/responses/GalleryGovernanceUnavailable"}
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: shareslices_session
      description: Browser session cookie established by successful email/password login.
    sessionBearer:
      type: http
      scheme: bearer
      description: Opaque independently revocable CLI Session credential.
  parameters:
    VerificationId:
      name: verificationId
      in: path
      required: true
      description: Opaque email verification identifier.
      schema:
        type: string
        minLength: 1
    CliVersion:
      name: ShareSlices-CLI-Version
      in: header
      required: true
      schema:
        type: string
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
      description: Semantic version of the current ShareSlices CLI process; not persisted.
    CliOperatingSystem:
      name: ShareSlices-CLI-OS
      in: header
      required: true
      schema:
        type: string
        enum: [linux, macos, windows]
      description: Coarse operating-system identifier used for compatibility; not persisted.
    CliVersionWhenBearer:
      name: ShareSlices-CLI-Version
      in: header
      required: false
      schema:
        type: string
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
      description: Required when the selected security scheme is sessionBearer; not persisted.
    CliOperatingSystemWhenBearer:
      name: ShareSlices-CLI-OS
      in: header
      required: false
      schema:
        type: string
        enum: [linux, macos, windows]
      description: Required when the selected security scheme is sessionBearer; not persisted.
    UserCode:
      name: userCode
      in: path
      required: true
      schema:
        type: string
        pattern: "^[A-Z2-9]{4}-?[A-Z2-9]{4}$"
    ArtifactId:
      name: artifactId
      in: path
      required: true
      description: Stable Artifact ID.
      schema:
        type: string
        minLength: 1
        maxLength: 128
    UploadSessionId:
      name: uploadSessionId
      in: path
      required: true
      description: Stable Upload session ID.
      schema:
        type: string
        minLength: 1
        maxLength: 128
    VersionId:
      name: versionId
      in: path
      required: true
      description: Stable immutable Version ID.
      schema:
        type: string
        minLength: 1
        maxLength: 128
    PublicationId:
      name: publicationId
      in: path
      required: true
      description: Stable Publication ID.
      schema:
        type: string
        minLength: 1
        maxLength: 128
    ShareSlug:
      name: shareSlug
      in: path
      required: true
      description: Opaque active or historical Share-link slug.
      schema:
        type: string
        minLength: 20
        maxLength: 64
        pattern: "^[A-Za-z0-9_-]+$"
    AssetPath:
      name: assetPath
      in: path
      required: true
      description: >
        Greedy relative Artifact path. The server decodes, normalizes, and
        resolves it only against the committed manifest.
      schema:
        type: string
        minLength: 1
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Caller-generated key scoped to the signed-in owner and operation.
      schema:
        type: string
        minLength: 1
        maxLength: 255
    GalleryListingId:
      name: listingId
      in: path
      required: true
      schema: {$ref: "#/components/schemas/GalleryListingId"}
    GalleryDecisionId:
      name: decisionId
      in: path
      required: true
      schema: {type: string, pattern: '^gdecision_[A-Za-z0-9_-]{20,128}$'}
    GallerySlug:
      name: gallerySlug
      in: path
      required: true
      description: Opaque Gallery listing slug that reveals no source or Creator identifier.
      schema: {$ref: "#/components/schemas/GallerySlug"}
    CreatorSlug:
      name: creatorSlug
      in: path
      required: true
      schema: {$ref: "#/components/schemas/CreatorSlug"}
    GalleryTag:
      name: tag
      in: path
      required: true
      schema: {$ref: "#/components/schemas/GalleryTag"}
    GalleryOperationId:
      name: operationId
      in: path
      required: true
      schema: {$ref: "#/components/schemas/GalleryOperationId"}
    GalleryCaseId:
      name: caseId
      in: path
      required: true
      schema: {$ref: "#/components/schemas/GalleryCaseId"}
    GalleryPlayerAuthorization:
      name: playerAuthorization
      in: path
      required: true
      description: Short-lived opaque public credential; redact the value from every log.
      schema: {type: string, minLength: 32, maxLength: 512}
    GalleryReviewAuthorization:
      name: reviewAuthorization
      in: path
      required: true
      description: Short-lived opaque Administrator-review credential; never valid on public routes.
      schema: {type: string, minLength: 32, maxLength: 512}
    ExpectedListingRevision:
      name: If-Match
      in: header
      required: true
      description: Quoted current listing concurrency revision.
      schema: {type: string, pattern: '^"[1-9][0-9]*"$'}
    ExpectedProfileRevision:
      name: If-Match
      in: header
      required: true
      description: Quoted current Creator-profile concurrency revision.
      schema: {type: string, pattern: '^"[1-9][0-9]*"$'}
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque cursor containing the complete deterministic ordering tuple.
      schema: {type: string, minLength: 1, maxLength: 1024}
    PageLimit:
      name: limit
      in: query
      required: false
      schema: {type: integer, minimum: 1, maximum: 100, default: 24}
    GalleryFeaturedPosition:
      name: position
      in: path
      required: true
      schema: {type: integer, minimum: 1, maximum: 1000}
  headers:
    RequestId:
      description: Stable request identifier for logs and support.
      schema:
        type: string
        minLength: 1
    RetryAfter:
      description: Server-owned minimum delay in seconds; it does not grant permission to replay a mutation.
      schema:
        type: integer
        minimum: 1
    NoStore:
      description: Prevents storage of sensitive or state-dependent responses.
      required: true
      schema:
        type: string
        enum:
          - no-store
    NoReferrer:
      description: Prevents credential-bearing content URLs from becoming referrer data.
      required: true
      schema: {type: string, enum: [no-referrer]}
    EntityTag:
      description: Quoted concurrency revision for the returned resource.
      schema: {type: string, pattern: '^"[1-9][0-9]*"$'}
  responses:
    Forbidden:
      description: The authenticated user cannot perform this operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            forbidden:
              value:
                error:
                  code: forbidden
                  message: Request is not allowed.
                  requestId: req_000000000000000000000000
    CliUpgradeRequired:
      description: The CLI is missing compatible metadata or must be upgraded.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            upgrade:
              value:
                error:
                  code: cli_upgrade_required
                  message: Update ShareSlices CLI to continue.
                  action: Update ShareSlices CLI to 0.1.0 or newer.
                  requestId: req_000000000000000000000000
                  details:
                    currentVersion: 0.0.9
                    minimumVersion: 0.1.0
                    operatingSystem: macos
                    supportedOperatingSystems: [linux, macos, windows]
    DeviceAuthorizationIncomplete:
      description: Authorization is pending, slowed, expired, denied, or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            pending:
              value:
                error:
                  code: authorization_pending
                  message: Authorization is still pending.
                  requestId: req_000000000000000000000000
    InvalidRequest:
      description: The request shape or field values are invalid.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidEmail:
              value:
                error:
                  code: invalid_request
                  message: Invalid request.
                  requestId: req_000000000000000000000000
                  fields:
                    - path: email
                      code: invalid_email
                      message: Enter a valid email.
    EmailAlreadyRegistered:
      description: An account already exists for the normalized email.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            duplicateEmail:
              value:
                error:
                  code: email_already_registered
                  message: An account already exists for this email.
                  requestId: req_000000000000000000000000
    InvalidLogin:
      description: Neutral login failure for wrong password or unknown email.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            neutralFailure:
              value:
                error:
                  code: invalid_login
                  message: Email or password is incorrect.
                  requestId: req_000000000000000000000000
    Unauthenticated:
      description: Signed-in state is missing or invalid.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            unauthenticated:
              value:
                error:
                  code: unauthenticated
                  message: Sign in to continue.
                  requestId: req_000000000000000000000000
    CurrentSessionUnauthenticated:
      description: Current signed-in state is missing or invalid.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            unauthenticated:
              value:
                error:
                  code: unauthenticated
                  message: Sign in to continue.
                  requestId: req_000000000000000000000000
    CurrentSessionForbidden:
      description: The sign-out request origin is not allowed.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            forbidden:
              value:
                error:
                  code: forbidden
                  message: Request origin is not allowed.
                  requestId: req_000000000000000000000000
    CurrentSessionInternalError:
      description: Current-Session sign out encountered an unexpected failure.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            internalError:
              value:
                error:
                  code: internal_error
                  message: Internal server error.
                  requestId: req_000000000000000000000000
    ArtifactNotFound:
      description: Artifact is unknown or is not owned by the current user.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notFound:
              value:
                error:
                  code: artifact_not_found
                  message: Artifact not found.
                  requestId: req_000000000000000000000000
    UploadSessionNotFound:
      description: Upload session is unknown or is not owned by the current user.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notFound:
              value:
                error:
                  code: upload_session_not_found
                  message: Upload session not found.
                  requestId: req_000000000000000000000000
    VersionNotFound:
      description: Version is unknown or is not owned by the current user.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notFound:
              value:
                error:
                  code: version_not_found
                  message: Version not found.
                  requestId: req_000000000000000000000000
    AssetNotFound:
      description: Normalized asset is absent from the committed Version manifest.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notFound:
              value:
                error:
                  code: asset_not_found
                  message: Asset not found.
                  requestId: req_000000000000000000000000
    ThumbnailNotFound:
      description: Thumbnail is pending, absent, failed, or not owned by the current user.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notFound:
              value:
                error:
                  code: thumbnail_not_found
                  message: Thumbnail not found.
                  requestId: req_000000000000000000000000
    VersionNotReady:
      description: Version exists but has not reached the ready state.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notReady:
              value:
                error:
                  code: version_not_ready
                  message: Version is not ready.
                  requestId: req_000000000000000000000000
    OperationConflict:
      description: >
        Mutation conflicts with current state, is still in progress, or
        reuses an idempotency key with different input.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            inProgress:
              value:
                error:
                  code: operation_in_progress
                  message: Operation is still in progress.
                  requestId: req_000000000000000000000000
            idempotencyConflict:
              value:
                error:
                  code: idempotency_conflict
                  message: Idempotency key was used with different input.
                  requestId: req_000000000000000000000000
            invalidState:
              value:
                error:
                  code: invalid_artifact_state
                  message: Artifact state does not allow this operation.
                  requestId: req_000000000000000000000000
    UploadTooLarge:
      description: Streamed ZIP exceeded the active archive-size limit.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            tooLarge:
              value:
                error:
                  code: archive_too_large
                  message: ZIP exceeds the upload limit.
                  action: Reduce the ZIP below the upload limit and try again.
                  details:
                    limitBytes: 52428800
                  requestId: req_000000000000000000000000
    RateLimited:
      description: >
        The request was rejected because the protected operation exceeded a
        server-owned delivery or attempt limit.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            rateLimited:
              value:
                error:
                  code: rate_limited
                  message: Too many attempts. Try again later.
                  requestId: req_000000000000000000000000
    InternalError:
      description: The API encountered an unexpected failure.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            internalError:
              value:
                error:
                  code: internal_error
                  message: Internal server error.
                  requestId: req_000000000000000000000000
    GalleryPermissionGrantRead:
      description: Current grant evidence; `grant` is null when no current grant exists.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/GalleryPermissionGrantResponse"}}}
    OwnGalleryProfileRead:
      description: Owner-visible staged or public Creator profile, or null before staging.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, ETag: {$ref: "#/components/headers/EntityTag"}, Cache-Control: {$ref: "#/components/headers/NoStore"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/OwnGalleryProfileResponse"}}}
    OwnerGalleryListingRead:
      description: Owner-visible current listing projection, proposal, evidence, and actions.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, ETag: {$ref: "#/components/headers/EntityTag"}, Cache-Control: {$ref: "#/components/headers/NoStore"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/OwnerGalleryListingResponse"}}}
    GalleryMutationAccepted:
      description: Durable historical operation outcome plus a separately labeled current projection.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/GalleryListingOperationResponse"}}}
    GalleryListingPageRead:
      description: One deterministic page containing only effectively accessible public projections.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}, Referrer-Policy: {$ref: "#/components/headers/NoReferrer"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/GalleryListingPage"}}}
    PublicGalleryListingRead:
      description: Eligible Listed committed public projection.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}, Referrer-Policy: {$ref: "#/components/headers/NoReferrer"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/PublicGalleryListing"}}}
    PublicCreatorProfileRead:
      description: Public profile and possibly empty eligible-listing collection.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}, Referrer-Policy: {$ref: "#/components/headers/NoReferrer"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/PublicCreatorProfileResponse"}}}
    GalleryPlayerAuthorizationRead:
      description: Short-lived public player authorization bound to listing, revision, and Version.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}, Referrer-Policy: {$ref: "#/components/headers/NoReferrer"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/GalleryPlayerAuthorizationResponse"}}}
    GalleryDownloadRead:
      description: Normalized ZIP stream accepted under a bounded durable source-read lease.
      headers:
        X-Request-Id: {$ref: "#/components/headers/RequestId"}
        Cache-Control: {$ref: "#/components/headers/NoStore"}
        Referrer-Policy: {$ref: "#/components/headers/NoReferrer"}
        Content-Disposition: {schema: {type: string}, description: Attachment filename derived from safe public metadata.}
      content: {application/zip: {schema: {type: string, format: binary}}}
    GalleryContentRead:
      description: Bound entry or manifest asset with content-runtime security policy.
      headers:
        Cache-Control: {$ref: "#/components/headers/NoStore"}
        Referrer-Policy: {$ref: "#/components/headers/NoReferrer"}
        Content-Security-Policy: {schema: {type: string}}
        Permissions-Policy: {schema: {type: string}}
        X-Content-Type-Options: {schema: {type: string, enum: [nosniff]}}
      content: {application/octet-stream: {schema: {type: string, format: binary}}}
    GalleryCopyOperationRead:
      description: Actor-bound durable Save-a-copy operation recovery projection.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/GalleryCopyOperationResponse"}}}
    GalleryReportAccepted:
      description: Neutral accepted report response.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/GalleryReportResponse"}}}
    GalleryAppealRead:
      description: Appeal outcome with snapshotted policy and deadline evidence.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/GalleryAppealResponse"}}}
    GalleryGovernanceCasePageRead:
      description: Authorized governance queue page.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/GalleryGovernanceCasePage"}}}
    GalleryNotificationPageRead:
      description: Actor-scoped durable governance notifications.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/GalleryNotificationPage"}}}
    GalleryGovernanceCaseRead:
      description: Authorized case detail with immutable evidence snapshot.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/GalleryGovernanceCaseResponse"}}}
    GalleryReviewAuthorizationRead:
      description: Distinct case-bound Administrator review credential or static-preview unavailability.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}, Referrer-Policy: {$ref: "#/components/headers/NoReferrer"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/GalleryReviewAuthorizationResponse"}}}
    GalleryGovernanceDecisionRead:
      description: Committed governance decision and resulting effective-access projection.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/GalleryGovernanceDecisionResponse"}}}
    GalleryFeaturedPositionRead:
      description: Durable Featured placement.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/GalleryFeaturedPosition"}}}
    GalleryUnavailable:
      description: Gallery admission is disabled or deployment-ineligible; accepted recovery may still be available.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrorResponse"}, examples: {unavailable: {value: {error: {code: gallery_unavailable, message: Gallery is unavailable., requestId: req_000000000000000000000000}}}}}}
    PublicGalleryUnavailable:
      description: Pre-lookup response while Gallery is disabled or deployment-ineligible.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}, Referrer-Policy: {$ref: "#/components/headers/NoReferrer"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrorResponse"}, examples: {unavailable: {value: {error: {code: gallery_unavailable, message: Gallery is unavailable., requestId: req_000000000000000000000000}}}}}}
    GalleryGovernanceUnavailable:
      description: A trusted governance dependency required by this operation is unavailable.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrorResponse"}}}
    PublicGalleryNotFound:
      description: Generic response for unknown, Pending, Removed, Restricted, taken-down, or otherwise ineligible listing state.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}, Referrer-Policy: {$ref: "#/components/headers/NoReferrer"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrorResponse"}}}
    PublicGalleryGone:
      description: Generic retired response for a Withdrawn listing; exposes no listing or Creator metadata.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}, Referrer-Policy: {$ref: "#/components/headers/NoReferrer"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrorResponse"}}}
    GalleryConflict:
      description: Revision, proposal, idempotency, state, grant, quota, or restoration conflict.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrorResponse"}}}
    GalleryListingNotFound:
      description: Listing is unknown or not owned by the authenticated actor.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrorResponse"}}}
    GalleryProfileNotFound:
      description: Profile is unknown, staged-only, account-deleted, or not owned where ownership is required.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}, Cache-Control: {$ref: "#/components/headers/NoStore"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrorResponse"}}}
    GalleryOperationNotFound:
      description: Operation is unknown or belongs to another actor.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrorResponse"}}}
    GalleryCaseNotFound:
      description: Governance case is unknown or unavailable to the Administrator.
      headers: {X-Request-Id: {$ref: "#/components/headers/RequestId"}}
      content: {application/json: {schema: {$ref: "#/components/schemas/ErrorResponse"}}}
  schemas:
    VerificationState:
      type: object
      additionalProperties: false
      required: [verification]
      properties:
        verification:
          type: object
          additionalProperties: false
          required: [id, destination, expiresIn, resendAvailableIn]
          properties:
            id:
              type: string
            destination:
              type: string
              description: Masked email destination.
            expiresIn:
              type: integer
              const: 600
            resendAvailableIn:
              type: integer
              minimum: 0
    VerificationCodeRequest:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
          pattern: "^[0-9 ]{6,7}$"
    CreateCliAuthorizationRequest:
      type: object
      additionalProperties: false
      required: [clientId]
      properties:
        clientId:
          type: string
          const: shareslices-cli
    CliAuthorizationCreatedResponse:
      type: object
      additionalProperties: false
      required: [authorization]
      properties:
        authorization:
          type: object
          additionalProperties: false
          required: [deviceCode, userCode, verificationUri, verificationUriComplete, expiresIn, interval]
          properties:
            deviceCode:
              type: string
            userCode:
              type: string
            verificationUri:
              type: string
              format: uri
            verificationUriComplete:
              type: string
              format: uri
            expiresIn:
              type: integer
              minimum: 1
            interval:
              type: integer
              minimum: 1
    CliAuthorizationResponse:
      type: object
      additionalProperties: false
      required: [authorization]
      properties:
        authorization:
          type: object
          additionalProperties: false
          required: [userCode, status]
          properties:
            userCode:
              type: string
            status:
              type: string
              enum: [pending, approved, denied]
    CreateCliSessionRequest:
      type: object
      additionalProperties: false
      required: [clientId, deviceCode]
      properties:
        clientId:
          type: string
          const: shareslices-cli
        deviceCode:
          type: string
          minLength: 1
    CliSessionCreatedResponse:
      type: object
      additionalProperties: false
      required: [session]
      properties:
        session:
          type: object
          additionalProperties: false
          required: [accessToken, tokenType, expiresIn]
          properties:
            accessToken:
              type: string
              minLength: 1
            tokenType:
              type: string
              const: Bearer
            expiresIn:
              type: integer
              minimum: 1
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - service
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          enum:
            - shareslices-api
    ReadinessResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - checks
      properties:
        status:
          type: string
          enum:
            - ready
            - not_ready
        checks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ReadinessCheck"
    ReadinessCheck:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - pass
            - fail
        message:
          type: string
          minLength: 1
    CreateUserRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
          description: Display name captured during registration.
        email:
          type: string
          format: email
          maxLength: 320
          description: Email sign-in identifier.
        password:
          type: string
          minLength: 8
          maxLength: 128
          format: password
          description: Email/password credential secret.
    CreateSessionRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 320
          description: Email sign-in identifier.
        password:
          type: string
          format: password
          minLength: 1
          maxLength: 128
          description: Email/password credential secret.
    CreateSessionResponse:
      type: object
      additionalProperties: false
      required:
        - signedIn
        - user
      properties:
        signedIn:
          type: boolean
          enum:
            - true
        user:
          $ref: "#/components/schemas/User"
    UserResponse:
      type: object
      additionalProperties: false
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 128
          description: Stable ShareSlices user ID.
        name:
          type: string
          minLength: 1
          maxLength: 120
          description: Display name captured during registration.
        email:
          type: string
          format: email
          maxLength: 320
          description: Email sign-in identifier.
    UploadPolicyResponse:
      type: object
      additionalProperties: false
      example:
        policy:
          revision: v0.0.1-default
          maxArchiveBytes: 52428800
          maxExpandedBytes: 209715200
          maxFileCount: 1000
          maxFileBytes: 52428800
          enabledExtensions: [.html, .css, .js, .png]
      required:
        - policy
      properties:
        policy:
          $ref: "#/components/schemas/UploadPolicy"
    UploadPolicy:
      type: object
      additionalProperties: false
      required:
        - revision
        - maxArchiveBytes
        - maxExpandedBytes
        - maxFileCount
        - maxFileBytes
        - enabledExtensions
      properties:
        revision:
          type: string
          minLength: 1
          description: Opaque revision snapshotted by newly accepted Upload sessions.
        maxArchiveBytes:
          type: integer
          format: int64
          minimum: 1
        maxExpandedBytes:
          type: integer
          format: int64
          minimum: 1
        maxFileCount:
          type: integer
          minimum: 1
        maxFileBytes:
          type: integer
          format: int64
          minimum: 1
        enabledExtensions:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            pattern: "^\\.[a-z0-9]+$"
    CreateArtifactRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - file
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        entry:
          type: string
          minLength: 1
          description: Optional archive-relative HTML Entry selected by the caller.
        file:
          type: string
          format: binary
          description: ZIP archive body.
    ReplaceArtifactFileRequest:
      type: object
      additionalProperties: false
      required:
        - file
      properties:
        file:
          type: string
          format: binary
          description: ZIP archive body for the new Upload session.
        entry:
          type: string
          minLength: 1
          description: Optional package-root-relative HTML Entry file selected by the caller.
    UpdateArtifactRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
    ArtifactAcceptedResponse:
      type: object
      additionalProperties: false
      example:
        artifactId: artifact-example
        uploadSessionId: upload-example
        processingState: accepted
      required:
        - artifactId
        - uploadSessionId
        - processingState
      properties:
        artifactId:
          type: string
          minLength: 1
        uploadSessionId:
          type: string
          minLength: 1
        processingState:
          $ref: "#/components/schemas/ProcessingState"
    ArtifactListResponse:
      type: object
      additionalProperties: false
      required:
        - artifacts
        - nextPageToken
      properties:
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/Artifact"
        nextPageToken:
          description: Token for the next page, or null when results are exhausted.
          oneOf:
            - type: string
            - type: "null"
    ArtifactResponse:
      type: object
      additionalProperties: false
      required:
        - artifact
      properties:
        artifact:
          $ref: "#/components/schemas/Artifact"
    Artifact:
      type: object
      additionalProperties: false
      example:
        id: artifact-example
        name: Quarterly report
        uploadSessionId: upload-example
        processingState: ready
        publicationStatus: published
        shareLink:
          url: https://view.example.com/a/W7e4jPFm3p8r7YEh2xQn2g/
          state: active
        readyVersion:
          id: version-example
          state: ready
          thumbnailState: ready
        publication:
          id: publication-example
          versionId: version-example
          publishedAt: "2026-07-10T08:00:00Z"
          expirationKind: permanent
          durationSeconds: null
          expiresAt: null
          endedAt: null
          endReason: null
        failure: null
        validationReport: null
        allowedActions: [rename, copy_share_link, preview, unpublish]
      required:
        - id
        - name
        - updatedAt
        - uploadSessionId
        - processingState
        - publicationStatus
        - shareLink
        - publication
        - allowedActions
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 128
        name:
          type: string
          minLength: 1
          maxLength: 120
        updatedAt:
          type: string
          format: date-time
        uploadSessionId:
          description: Current Upload session ID used for Retry when one exists.
          oneOf:
            - type: string
              minLength: 1
              maxLength: 128
            - type: "null"
        processingState:
          $ref: "#/components/schemas/ProcessingState"
        publicationStatus:
          type: string
          enum: [not_published, published, expired, unpublished]
        shareLink:
          oneOf:
            - $ref: "#/components/schemas/ShareLink"
            - type: "null"
        readyVersion:
          oneOf:
            - $ref: "#/components/schemas/VersionSummary"
            - type: "null"
        publication:
          description: Latest Publication, including an Expired or Unpublished one, or null before first Publish.
          oneOf:
            - $ref: "#/components/schemas/Publication"
            - type: "null"
        failure:
          oneOf:
            - $ref: "#/components/schemas/ProcessingFailure"
            - type: "null"
        validationReport:
          oneOf:
            - $ref: "#/components/schemas/ValidationReport"
            - type: "null"
        allowedActions:
          type: array
          uniqueItems: true
          items:
            type: string
            enum:
              - rename
              - retry
              - replace_file
              - preview
              - publish
              - unpublish
              - copy_share_link
              - export
              - delete
    ProcessingState:
      type: string
      enum:
        - accepted
        - processing
        - ready
        - failed
    ShareLink:
      type: object
      additionalProperties: false
      required:
        - url
        - state
      properties:
        url:
          type: string
          format: uri
        state:
          type: string
          enum:
            - active
            - retired
    VersionSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - state
        - thumbnailState
      properties:
        id:
          type: string
          minLength: 1
        state:
          type: string
          enum:
            - ready
        thumbnailState:
          type: string
          enum:
            - pending
            - ready
            - failed
    ReadyVersionListResponse:
      type: object
      additionalProperties: false
      required:
        - versions
      properties:
        versions:
          type: array
          items:
            $ref: "#/components/schemas/ReadyVersionListItem"
    ReadyVersionListItem:
      type: object
      additionalProperties: false
      required:
        - id
        - versionNumber
        - state
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 128
        versionNumber:
          type: integer
          minimum: 1
        state:
          type: string
          enum:
            - ready
    ProcessingFailure:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - recoverable
      properties:
        code:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
        message:
          type: string
          minLength: 1
        recoverable:
          type: boolean
    ValidationDetails:
      type: object
      additionalProperties: false
      properties:
        path:
          type: string
        paths:
          type: array
          items:
            type: string
        candidates:
          type: array
          items:
            type: string
        extension:
          type: string
        validationKind:
          type: string
        actualBytes:
          oneOf:
            - type: integer
              format: int64
              minimum: 0
              maximum: 9007199254740991
            - type: string
              pattern: "^(0|[1-9][0-9]*)$"
        limitBytes:
          oneOf:
            - type: integer
              format: int64
              minimum: 0
              maximum: 9007199254740991
            - type: string
              pattern: "^(0|[1-9][0-9]*)$"
        actualCount:
          oneOf:
            - type: integer
              format: int64
              minimum: 0
              maximum: 9007199254740991
            - type: string
              pattern: "^(0|[1-9][0-9]*)$"
        limitCount:
          oneOf:
            - type: integer
              format: int64
              minimum: 0
              maximum: 9007199254740991
            - type: string
              pattern: "^(0|[1-9][0-9]*)$"
        ignoredCount:
          oneOf:
            - type: integer
              format: int64
              minimum: 0
              maximum: 9007199254740991
            - type: string
              pattern: "^(0|[1-9][0-9]*)$"
        directory:
          type: string
        entryFile:
          type: string
    CliCompatibilityDetails:
      type: object
      additionalProperties: false
      required:
        - currentVersion
        - minimumVersion
        - operatingSystem
        - supportedOperatingSystems
      properties:
        currentVersion:
          type: string
        minimumVersion:
          type: string
          pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        operatingSystem:
          type: string
        supportedOperatingSystems:
          type: array
          uniqueItems: true
          items:
            type: string
            enum: [linux, macos, windows]
    RequestFieldDetails:
      type: object
      additionalProperties: false
      properties:
        expected:
          type: string
        received:
          type: string
    SizeLimitDetails:
      type: object
      additionalProperties: false
      required:
        - limitBytes
      properties:
        actualBytes:
          type: integer
          format: int64
          minimum: 0
        limitBytes:
          type: integer
          format: int64
          minimum: 1
    ConflictDetails:
      type: object
      additionalProperties: false
      properties:
        resourceId:
          type: string
        state:
          type: string
    ValidationNotice:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - action
        - details
      properties:
        code:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
        message:
          type: string
          minLength: 1
        action:
          oneOf:
            - type: string
              minLength: 1
            - type: "null"
        details:
          $ref: "#/components/schemas/ValidationDetails"
    ValidationReport:
      type: object
      additionalProperties: false
      required:
        - primaryIssue
        - issues
        - warnings
      properties:
        primaryIssue:
          oneOf:
            - $ref: "#/components/schemas/ValidationNotice"
            - type: "null"
        issues:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/ValidationNotice"
        warnings:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/ValidationNotice"
    CreatePublicationRequest:
      type: object
      additionalProperties: false
      required:
